<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dekorcum Admin Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#8B6914;
  --dark:#0D0D0D;--dark2:#111111;--dark3:#1A1A1A;--dark4:#222222;--dark5:#2A2A2A;
  --text:#E8E0D0;--text-muted:#7A7060;--white:#F5F0E8;
  --green:#2ECC71;--red:#E74C3C;--blue:#3498DB;--orange:#E67E22;
  --sidebar:260px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a1208 0%,#0D0D0D 70%);}
.login-box{background:var(--dark3);border:1px solid rgba(201,168,76,.2);padding:60px 50px;width:420px;border-radius:4px;text-align:center;}
.login-logo{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);margin-bottom:6px;}
.login-sub{font-size:11px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;margin-bottom:40px;}
.login-box h2{font-size:16px;color:var(--text-muted);margin-bottom:30px;font-weight:400;}
.form-group{margin-bottom:16px;text-align:left;}
.form-group label{display:block;font-size:12px;color:var(--text-muted);letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase;}
.form-control{width:100%;background:var(--dark4);border:1px solid rgba(201,168,76,.15);color:var(--text);padding:13px 16px;border-radius:4px;font-family:'Raleway',sans-serif;font-size:14px;outline:none;transition:border .3s;}
.form-control:focus{border-color:var(--gold);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0D0D0D;border:none;padding:15px;font-family:'Raleway',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;border-radius:4px;margin-top:10px;transition:all .3s;}
.btn-login:hover{filter:brightness(1.1);}
.login-error{color:var(--red);font-size:13px;margin-top:12px;display:none;}

/* LAYOUT */
#adminApp{display:none;}
.admin-layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--dark2);border-right:1px solid rgba(201,168,76,.1);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
.sidebar-brand{padding:28px 24px;border-bottom:1px solid rgba(201,168,76,.08);}
.sidebar-brand .name{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.sidebar-brand .sub{font-size:10px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
.sidebar-nav{padding:16px 0;flex:1;}
.nav-section{padding:8px 20px;font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:var(--text-muted);cursor:pointer;transition:all .3s;font-size:14px;font-weight:500;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(201,168,76,.05);color:var(--text);}
.nav-item.active{background:rgba(201,168,76,.08);color:var(--gold);border-left-color:var(--gold);}
.nav-item .icon{width:18px;text-align:center;font-size:16px;}
.sidebar-bottom{padding:16px 24px;border-top:1px solid rgba(201,168,76,.08);}
.btn-logout{width:100%;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--red);padding:10px;font-family:'Raleway',sans-serif;font-size:13px;cursor:pointer;border-radius:4px;transition:all .3s;}
.btn-logout:hover{background:rgba(231,76,60,.2);}

/* MAIN */
.admin-main{margin-left:var(--sidebar);flex:1;padding:0;}
.admin-topbar{background:var(--dark2);border-bottom:1px solid rgba(201,168,76,.08);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-badge{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:var(--gold);padding:6px 14px;border-radius:20px;font-size:12px;}
.admin-body{padding:32px;}

/* DASHBOARD */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px;}
.stat-card{background:var(--dark3);border:1px solid rgba(201,168,76,.08);border-radius:4px;padding:24px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-dark));}
.stat-card .label{font-size:11px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.stat-card .value{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);margin-bottom:4px;}
.stat-card .change{font-size:12px;color:var(--green);}
.stat-card .icon{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.15;}

/* PANELS */
.panel{background:var(--dark3);border:1px solid rgba(201,168,76,.08);border-radius:4px;margin-bottom:24px;}
.panel-header{padding:20px 24px;border-bottom:1px solid rgba(201,168,76,.06);display:flex;align-items:center;justify-content:space-between;}
.panel-header h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--white);}
.panel-body{padding:24px;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{padding:12px 16px;background:var(--dark4);color:var(--text-muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;text-align:left;}
.data-table td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;vertical-align:middle;}
.data-table tr:hover td{background:rgba(201,168,76,.03);}
.data-table .img-cell{width:50px;height:50px;background:var(--dark5);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.badge{padding:4px 10px;border-radius:2px;font-size:11px;font-weight:700;}
.badge-green{background:rgba(46,204,113,.15);color:var(--green);}
.badge-red{background:rgba(231,76,60,.15);color:var(--red);}
.badge-gold{background:rgba(201,168,76,.15);color:var(--gold);}
.badge-blue{background:rgba(52,152,219,.15);color:var(--blue);}

/* BUTTONS */
.btn{padding:8px 18px;border:none;cursor:pointer;font-family:'Raleway',sans-serif;font-weight:600;font-size:13px;border-radius:3px;transition:all .3s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary-sm{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0D0D0D;}
.btn-primary-sm:hover{filter:brightness(1.1);}
.btn-outline{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--gold);}
.btn-outline:hover{background:rgba(201,168,76,.1);}
.btn-danger{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--red);}
.btn-danger:hover{background:rgba(231,76,60,.2);}
.btn-success{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:var(--green);}
.btn-success:hover{background:rgba(46,204,113,.2);}
.btn-sm{padding:6px 12px;font-size:12px;}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.form-row.single{grid-template-columns:1fr;}
.field{display:flex;flex-direction:column;gap:7px;}
.field label{font-size:11px;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;font-weight:600;}
.field input,.field select,.field textarea{background:var(--dark4);border:1px solid rgba(201,168,76,.15);color:var(--text);padding:11px 14px;border-radius:4px;font-family:'Raleway',sans-serif;font-size:14px;outline:none;transition:border .3s;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:var(--dark4);}
.field textarea{resize:vertical;min-height:80px;}
.color-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.color-chip{background:var(--dark5);border:1px solid rgba(201,168,76,.15);color:var(--text-muted);padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.color-chip .remove{color:var(--red);font-size:14px;cursor:pointer;}
.add-color-row{display:flex;gap:8px;}

/* TOGGLE */
.toggle{position:relative;width:46px;height:24px;cursor:pointer;}
.toggle input{display:none;}
.toggle-slider{position:absolute;inset:0;background:var(--dark5);border-radius:24px;transition:.3s;border:1px solid rgba(255,255,255,.1);}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;background:var(--text-muted);border-radius:50%;left:3px;top:2px;transition:.3s;}
.toggle input:checked + .toggle-slider{background:rgba(201,168,76,.2);border-color:var(--gold);}
.toggle input:checked + .toggle-slider::before{transform:translateX(22px);background:var(--gold);}

/* IMAGE UPLOAD */
.img-upload-area{border:2px dashed rgba(201,168,76,.2);border-radius:4px;padding:32px;text-align:center;cursor:pointer;transition:all .3s;position:relative;background:var(--dark4);}
.img-upload-area:hover{border-color:var(--gold);background:rgba(201,168,76,.03);}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.img-upload-area .icon{font-size:40px;margin-bottom:10px;}
.img-upload-area p{color:var(--text-muted);font-size:14px;}
.img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:4px;margin-top:12px;display:none;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid rgba(201,168,76,.1);margin-bottom:24px;}
.tab{padding:12px 24px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .3s;letter-spacing:.5px;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* TOAST */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--dark3);border:1px solid rgba(201,168,76,.2);color:var(--text);padding:14px 20px;border-radius:4px;font-size:14px;display:flex;align-items:center;gap:10px;min-width:280px;animation:toastIn .3s ease;}
.toast.success{border-color:rgba(46,204,113,.3);}
.toast.error{border-color:rgba(231,76,60,.3);}
@keyframes toastIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* MODAL */
.admin-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;padding:20px;}
.admin-modal-overlay.active{display:flex;}
.admin-modal{background:var(--dark3);border:1px solid rgba(201,168,76,.15);border-radius:4px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;}
.admin-modal-header{padding:20px 24px;border-bottom:1px solid rgba(201,168,76,.08);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--dark3);z-index:1;}
.admin-modal-header h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--white);}
.admin-modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px;transition:color .3s;}
.admin-modal-close:hover{color:var(--gold);}
.admin-modal-body{padding:24px;}
.admin-modal-footer{padding:16px 24px;border-top:1px solid rgba(201,168,76,.08);display:flex;justify-content:flex-end;gap:12px;}

/* SECTION */
.section-title-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.section-title-bar h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--white);}

/* LOGO PREVIEW */
.logo-preview-area{background:var(--dark4);border:1px solid rgba(201,168,76,.15);border-radius:4px;padding:24px;text-align:center;margin-bottom:16px;}
.logo-preview-area img{max-height:80px;max-width:200px;object-fit:contain;}

@media(max-width:900px){
  .sidebar{width:0;overflow:hidden;}
  .admin-main{margin-left:0;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo" id="loginLogo">DEKORCUM</div>
    <div class="login-sub">Admin Paneli</div>
    <h2>Lütfen giriş yapın</h2>
    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <input class="form-control" type="text" id="loginUser" placeholder="admin">
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input class="form-control" type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div class="login-error" id="loginError">Kullanıcı adı veya şifre hatalı.</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <div class="admin-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="name" id="sidebarBrand">DEKORCUM</div>
        <div class="sub">Admin Paneli</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Genel</div>
        <div class="nav-item active" onclick="showSection('dashboard')"><span class="icon">📊</span> Özet</div>
        <div class="nav-section">Ürün Yönetimi</div>
        <div class="nav-item" onclick="showSection('products')"><span class="icon">📦</span> Ürünler</div>
        <div class="nav-item" onclick="showSection('categories')"><span class="icon">🗂️</span> Kategoriler</div>
        <div class="nav-section">İçerik</div>
        <div class="nav-item" onclick="showSection('campaign')"><span class="icon">🎯</span> Kampanya</div>
        <div class="nav-item" onclick="showSection('settings')"><span class="icon">⚙️</span> Firma Bilgileri</div>
        <div class="nav-item" onclick="showSection('social')"><span class="icon">📱</span> Sosyal Medya</div>
        <div class="nav-item" onclick="showSection('logo')"><span class="icon">🖼️</span> Logo & Görsel</div>
        <div class="nav-section">Sistem</div>
        <div class="nav-item" onclick="showSection('security')"><span class="icon">🔒</span> Güvenlik</div>
        <div class="nav-item" onclick="openSite()"><span class="icon">🌐</span> Siteyi Görüntüle</div>
      </nav>
      <div class="sidebar-bottom">
        <button class="btn-logout" onclick="doLogout()">⬅ Çıkış Yap</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-title" id="topbarTitle">Özet</div>
        <div class="topbar-right">
          <span class="topbar-badge" id="topbarUser">admin</span>
        </div>
      </div>
      <div class="admin-body" id="adminBody"></div>
    </main>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="admin-modal-overlay" id="productModal">
  <div class="admin-modal">
    <div class="admin-modal-header">
      <h3 id="productModalTitle">Ürün Ekle</h3>
      <button class="admin-modal-close" onclick="closeProductModal()">✕</button>
    </div>
    <div class="admin-modal-body" id="productModalBody"></div>
    <div class="admin-modal-footer">
      <button class="btn btn-outline" onclick="closeProductModal()">İptal</button>
      <button class="btn btn-primary-sm" onclick="saveProduct()">💾 Kaydet</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="admin-modal-overlay" id="categoryModal">
  <div class="admin-modal">
    <div class="admin-modal-header">
      <h3 id="categoryModalTitle">Kategori Ekle</h3>
      <button class="admin-modal-close" onclick="closeCategoryModal()">✕</button>
    </div>
    <div class="admin-modal-body" id="categoryModalBody"></div>
    <div class="admin-modal-footer">
      <button class="btn btn-outline" onclick="closeCategoryModal()">İptal</button>
      <button class="btn btn-primary-sm" onclick="saveCategory()">💾 Kaydet</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// STORAGE HELPERS
// ============================================================
const KEY = 'dk_';
function save(k, v){ localStorage.setItem(KEY+k, JSON.stringify(v)); }
function load(k, fb){ try{ const d=localStorage.getItem(KEY+k); return d?JSON.parse(d):fb; }catch(e){ return fb; } }

// ============================================================
// DEFAULTS
// ============================================================
function defaultSettings(){
  return load('settings',{
    brandName:'DEKORCUM', brandSub:'Yapı & Dekorasyon',
    phone:'+90 532 000 00 00', whatsapp:'+905320000000',
    email:'info@dekorcum.com', address:'İzmir, Türkiye',
    instagram:'https://instagram.com/dekorcum_toptan',
    facebook:'https://facebook.com/dekorcum', youtube:'',
    campaign:{ active:true, title:'Bayi Kampanyası', desc:'Toptan alımlarda özel fiyatlar ve avantajlı ödeme koşulları.', pct:'%15', label:'İndirim' },
    marqueeItems:['MDF Panel','Akustik Panel','Duvar Çıtası','Lambri','Bordür','Süpürgelik','Motifler','Toptan Satış']
  });
}

function defaultCategories(){
  return load('categories',[
    {id:1,name:'MDF Panel',slug:'mdf-panel',icon:'🪵',desc:'Dekoratif duvar panelleri'},
    {id:2,name:'Tavan & Duvar Lambri',slug:'lambri',icon:'🏠',desc:'Tavan ve duvar kaplamalar'},
    {id:3,name:'Duvar Çıtası',slug:'duvar-citasi',icon:'📐',desc:'Her ölçüde duvar çıtaları'},
    {id:4,name:'Motifler',slug:'motifler',icon:'🔷',desc:'Dekoratif motifler ve kabartmalar'},
    {id:5,name:'Duvar Bordürleri',slug:'borduler',icon:'〰️',desc:'Klasik ve modern bordürler'},
    {id:6,name:'Süpürgelikler',slug:'supurgelik',icon:'📏',desc:'PVC ve MDF süpürgelikler'},
    {id:7,name:'Akustik Panel',slug:'akustik',icon:'🔊',desc:'Ses ve ısı yalıtım panelleri'}
  ]);
}

function defaultProducts(){
  return load('products',[
    {id:1,name:'DMP-ANADOLU CEVİZ MDF DUVAR PANELİ',code:'DMP-001',catId:1,price:300,oldPrice:350,unit:'boy',stock:100,badge:'İndirim',colors:['Ceviz','Beyaz'],desc:'1 boy için fiyatlandırılmıştır.',img:'',active:true},
    {id:2,name:'DP-OMEGA-1 GÜMÜŞ EFEKTLİ SİYAH DUVAR PANELİ',code:'DP-002',catId:1,price:300,oldPrice:330,unit:'boy',stock:80,badge:'Yeni',colors:['Siyah','Gümüş'],desc:'Neme ve suya dayanıklı premium panel.',img:'',active:true},
    {id:3,name:'GOLD ALTIN DUVAR ÇITASI',code:'DC-001',catId:3,price:85,oldPrice:null,unit:'adet',stock:500,badge:'',colors:['Gold','Gümüş'],desc:'Dekoratif altın duvar çıtası.',img:'',active:true},
    {id:4,name:'AKUSTİK SES YALITIM PANELİ',code:'AK-001',catId:7,price:450,oldPrice:null,unit:'m²',stock:200,badge:'Yeni',colors:['Gri','Krem'],desc:'Profesyonel ses ve ısı yalıtım paneli.',img:'',active:true},
    {id:5,name:'PVC SÜPÜRGELİK 8CM',code:'SP-001',catId:6,price:45,oldPrice:null,unit:'metre',stock:1000,badge:'',colors:['Beyaz','Krem'],desc:'Dayanıklı PVC süpürgelik.',img:'',active:true},
    {id:6,name:'TAVAN LAMBRİSİ BEYAZ',code:'TL-001',catId:2,price:120,oldPrice:140,unit:'boy',stock:300,badge:'İndirim',colors:['Beyaz','Krem'],desc:'Klasik tavan lambri.',img:'',active:true}
  ]);
}

// ============================================================
// AUTH
// ============================================================
let adminCredentials = load('adminCreds', { user:'admin', pass:'dekorcum2025' });
let currentEditProduct = null, currentEditCategory = null, currentColors = [];

function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const creds = load('adminCreds', { user:'admin', pass:'dekorcum2025' });
  if(u === creds.user && p === creds.pass){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    document.getElementById('topbarUser').textContent = u;
    const s = defaultSettings();
    document.getElementById('sidebarBrand').textContent = s.brandName;
    showSection('dashboard');
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

// ============================================================
// SECTIONS
// ============================================================
const sectionTitles = {
  dashboard:'📊 Özet', products:'📦 Ürünler', categories:'🗂️ Kategoriler',
  campaign:'🎯 Kampanya', settings:'⚙️ Firma Bilgileri', social:'📱 Sosyal Medya',
  logo:'🖼️ Logo & Görsel', security:'🔒 Güvenlik'
};

function showSection(name){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.textContent.trim().includes(sectionTitles[name]?.replace(/[📊📦🗂️🎯⚙️📱🖼️🔒🌐]\s?/,'')));
  });
  document.getElementById('topbarTitle').textContent = sectionTitles[name] || name;
  const body = document.getElementById('adminBody');
  if(name==='dashboard') body.innerHTML = renderDashboard();
  else if(name==='products') body.innerHTML = renderProducts();
  else if(name==='categories') body.innerHTML = renderCategories();
  else if(name==='campaign') body.innerHTML = renderCampaign();
  else if(name==='settings') body.innerHTML = renderSettings();
  else if(name==='social') body.innerHTML = renderSocial();
  else if(name==='logo') body.innerHTML = renderLogo();
  else if(name==='security') body.innerHTML = renderSecurity();
}

function openSite(){
  window.open('index.html', '_blank');
}

          <tbody>

              <tr>
                <td><div class="img-cell">${p.img ? `<img src="${p.img}" style="width:50px;height:50px;object-fit:cover;border-radius:3px;">` : '🪵'}</div></td>

    <div class="panel">

      <div class="panel-body" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
        <button class="btn btn-primary-sm" onclick="openAddProduct()">+ Ürün Ekle</button>

function renderProducts(){
  const products = defaultProducts();
  const cats = defaultCategories();
  return `
    <div class="section-title-bar">
      <h2>Ürün Yönetimi</h2>
      <button class="btn btn-primary-sm" onclick="openAddProduct()">➕ Yeni Ürün Ekle</button>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h3>Tüm Ürünler (${products.length})</h3>
        <input class="form-control" style="width:250px;padding:8px 12px;font-size:13px;" type="text" placeholder="Ürün ara..." oninput="filterProductTable(this.value)">
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table" id="productTable">
          <thead><tr><th>Görsel</th><th>Ürün Adı</th><th>Kod</th><th>Kategori</th><th>Fiyat</th><th>Birim</th><th>Stok</th><th>Durum</th><th>İşlemler</th></tr></thead>
          <tbody id="productTableBody">
            ${products.map(p=>{
              const cat = cats.find(c=>c.id===p.catId);
              return `
                <tr data-name="${p.name.toLowerCase()} ${p.code.toLowerCase()}">
                  <td><div class="img-cell">${p.img?`<img src="${p.img}" style="width:50px;height:50px;object-fit:cover;border-radius:3px;">`:'🪵'}</div></td>
                  <td><div style="max-width:200px;font-size:13px;font-weight:500;">${p.name}</div></td>
                  <td><span style="font-size:12px;color:var(--text-muted);">${p.code}</span></td>
                  <td><span class="badge badge-blue">${cat?cat.name:'?'}</span></td>
                  <td><strong style="color:var(--gold);">${p.price} ₺</strong>${p.oldPrice?`<br><span style="font-size:11px;color:var(--text-muted);text-decoration:line-through;">${p.oldPrice} ₺</span>`:''}</td>
                  <td>${p.unit}</td>
                  <td>${p.stock}</td>
                  <td><span class="badge ${p.active?'badge-green':'badge-red'}">${p.active?'Aktif':'Pasif'}</span></td>
                  <td style="white-space:nowrap;">
                    <button class="btn btn-outline btn-sm" onclick="openEditProduct(${p.id})">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function filterProductTable(q){
  document.querySelectorAll('#productTableBody tr').forEach(row=>{
    row.style.display = row.dataset.name.includes(q.toLowerCase()) ? '' : 'none';
  });
}

let editProductId = null;

function openAddProduct(){
  editProductId = null;
  currentColors = [];
  document.getElementById('productModalTitle').textContent = 'Yeni Ürün Ekle';
  document.getElementById('productModalBody').innerHTML = productForm(null);
  document.getElementById('productModal').classList.add('active');
}

function openEditProduct(id){
  const products = defaultProducts();
  const p = products.find(x=>x.id===id);
  if(!p) return;
  editProductId = id;
  currentColors = [...(p.colors||[])];
  document.getElementById('productModalTitle').textContent = 'Ürünü Düzenle';
  document.getElementById('productModalBody').innerHTML = productForm(p);
  document.getElementById('productModal').classList.add('active');
  renderColorChips();
}

function productForm(p){
  const cats = defaultCategories();
  return `
    <div class="form-row">
      <div class="field"><label>Ürün Adı *</label><input id="pName" type="text" value="${p?p.name:''}"></div>
      <div class="field"><label>Stok Kodu *</label><input id="pCode" type="text" value="${p?p.code:''}"></div>
    </div>
    <div class="form-row three">
      <div class="field"><label>Fiyat (₺) *</label><input id="pPrice" type="number" step="0.01" value="${p?p.price:''}"></div>
      <div class="field"><label>Eski Fiyat (₺)</label><input id="pOldPrice" type="number" step="0.01" value="${p&&p.oldPrice?p.oldPrice:''}"></div>
      <div class="field"><label>Stok Miktarı</label><input id="pStock" type="number" value="${p?p.stock:0}"></div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Kategori *</label>
        <select id="pCat">
          ${cats.map(c=>`<option value="${c.id}" ${p&&p.catId===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Fiyat Birimi</label>
        <select id="pUnit">
          ${['adet','tane','boy','metre','m²','m³','paket','takım','kutu','rulo'].map(u=>`<option value="${u}" ${p&&p.unit===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Rozet/Etiket</label>
        <select id="pBadge">
          <option value="" ${p&&!p.badge?'selected':''}>Yok</option>
          <option value="Yeni" ${p&&p.badge==='Yeni'?'selected':''}>Yeni</option>
          <option value="İndirim" ${p&&p.badge==='İndirim'?'selected':''}>İndirim</option>
          <option value="Kampanya" ${p&&p.badge==='Kampanya'?'selected':''}>Kampanya</option>
          <option value="Öne Çıkan" ${p&&p.badge==='Öne Çıkan'?'selected':''}>Öne Çıkan</option>
        </select>
      </div>
      <div class="field" style="align-items:center;flex-direction:row;gap:12px;padding-top:24px;">
        <label style="margin:0;white-space:nowrap;">Aktif</label>
        <label class="toggle"><input type="checkbox" id="pActive" ${!p||p.active?'checked':''}><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="field" style="margin-bottom:16px;">
      <label>Ürün Açıklaması</label>
      <textarea id="pDesc">${p?p.desc:''}</textarea>
    </div>
    <div class="field" style="margin-bottom:16px;">
      <label>Renkler / Varyantlar</label>
      <div class="add-color-row">
        <input id="colorInput" type="text" placeholder="Renk veya varyant ekle..." style="flex:1;background:var(--dark4);border:1px solid rgba(201,168,76,.15);color:var(--text);padding:10px 14px;border-radius:4px;font-family:'Raleway',sans-serif;font-size:14px;outline:none;" onkeydown="if(event.key==='Enter'){addColor();event.preventDefault();}">
        <button class="btn btn-outline btn-sm" onclick="addColor()">Ekle</button>
      </div>
      <div class="color-chips" id="colorChips"></div>
    </div>
    <div class="field">
      <label>Ürün Görseli</label>
      <div class="img-upload-area" onclick="document.getElementById('pImgFile').click()">
        <input type="file" id="pImgFile" accept="image/*" style="display:none" onchange="handleProductImg(event)">
        <div class="icon">📸</div>
        <p>Görsel yüklemek için tıklayın<br><small style="color:var(--text-muted);">PNG, JPG, WEBP — Max 5MB</small></p>
        <img id="pImgPreview" class="img-preview" src="${p&&p.img?p.img:''}">
      </div>
      <input type="hidden" id="pImg" value="${p?p.img:''}">
    </div>
  `;
}

function renderColorChips(){
  const el = document.getElementById('colorChips');
  if(!el) return;
  el.innerHTML = currentColors.map((c,i)=>`
    <div class="color-chip">${c}<span class="remove" onclick="removeColor(${i})">×</span></div>
  `).join('');
}

function addColor(){
  const inp = document.getElementById('colorInput');
  if(!inp || !inp.value.trim()) return;
  currentColors.push(inp.value.trim());
  inp.value = '';
  renderColorChips();
}

function removeColor(i){
  currentColors.splice(i,1);
  renderColorChips();
}

function handleProductImg(e){
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024) { toast('Dosya 5MB\'dan büyük olamaz.','error'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('pImg').value = ev.target.result;
    const prev = document.getElementById('pImgPreview');
    prev.src = ev.target.result;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveProduct(){
  const name = document.getElementById('pName').value.trim();
  const code = document.getElementById('pCode').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  const oldPrice = parseFloat(document.getElementById('pOldPrice').value) || null;
  const catId = parseInt(document.getElementById('pCat').value);
  const unit = document.getElementById('pUnit').value;
  const badge = document.getElementById('pBadge').value;
  const active = document.getElementById('pActive').checked;
  const desc = document.getElementById('pDesc').value.trim();
  const img = document.getElementById('pImg').value;
  const stock = parseInt(document.getElementById('pStock').value) || 0;

  if(!name || !code || !price) { toast('Ad, kod ve fiyat zorunludur.','error'); return; }

  let products = defaultProducts();
  if(editProductId){
    const idx = products.findIndex(p=>p.id===editProductId);
    if(idx > -1) products[idx] = { ...products[idx], name, code, price, oldPrice, catId, unit, badge, active, desc, img, stock, colors:currentColors };
  } else {
    const newId = Math.max(0, ...products.map(p=>p.id)) + 1;
    products.push({ id:newId, name, code, price, oldPrice, catId, unit, badge, active, desc, img, stock, colors:currentColors });
  }
  save('products', products);
  closeProductModal();
  showSection('products');
  toast(editProductId ? 'Ürün güncellendi.' : 'Ürün eklendi.','success');
}

function deleteProduct(id){
  if(!confirm('Bu ürünü silmek istediğinize emin misiniz?')) return;
  let products = defaultProducts().filter(p=>p.id!==id);
  save('products', products);
  showSection('products');
  toast('Ürün silindi.','success');
}

function closeProductModal(){
  document.getElementById('productModal').classList.remove('active');
  currentColors = [];
}

let editCategoryId = null;

function openAddCategory(){
  editCategoryId = null;
  document.getElementById('categoryModalTitle').textContent = 'Yeni Kategori Ekle';
  document.getElementById('categoryModalBody').innerHTML = categoryForm(null);
  document.getElementById('categoryModal').classList.add('active');
}

function openEditCategory(id){
  const cats = defaultCategories();
  const c = cats.find(x=>x.id===id);
  if(!c) return;
  editCategoryId = id;
  document.getElementById('categoryModalTitle').textContent = 'Kategori Düzenle';
  document.getElementById('categoryModalBody').innerHTML = categoryForm(c);
  document.getElementById('categoryModal').classList.add('active');
}

function categoryForm(c){
  return `
    <div class="form-row">
      <div class="field"><label>Kategori Adı *</label><input id="cName" type="text" value="${c?c.name:''}"></div>
      <div class="field"><label>İkon (Emoji)</label><input id="cIcon" type="text" value="${c?c.icon:'🪵'}" placeholder="🪵"></div>
    </div>
    <div class="form-row single">
      <div class="field"><label>Slug (URL)</label><input id="cSlug" type="text" value="${c?c.slug:''}" placeholder="ornek-kategori"></div>
    </div>
    <div class="form-row single">
      <div class="field"><label>Kısa Açıklama</label><input id="cDesc" type="text" value="${c?c.desc:''}" placeholder="Kategori açıklaması..."></div>
    </div>
  `;
}

function saveCategory(){
  const name = document.getElementById('cName').value.trim();
  const icon = document.getElementById('cIcon').value.trim() || '🪵';
  let slug = document.getElementById('cSlug').value.trim();
  const desc = document.getElementById('cDesc').value.trim();
  if(!name){ toast('Kategori adı zorunludur.','error'); return; }
  if(!slug) slug = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  let cats = defaultCategories();
  if(editCategoryId){
    const idx = cats.findIndex(c=>c.id===editCategoryId);
    if(idx>-1) cats[idx] = {...cats[idx], name, icon, slug, desc};
  } else {
    const newId = Math.max(0,...cats.map(c=>c.id))+1;
    cats.push({id:newId, name, icon, slug, desc});
  }
  save('categories', cats);
  closeCategoryModal();
  showSection('categories');
  toast(editCategoryId ? 'Kategori güncellendi.' : 'Kategori eklendi.','success');
}

function deleteCategory(id){
  if(!confirm('Bu kategoriyi silmek istediğinize emin misiniz?')) return;
  let cats = defaultCategories().filter(c=>c.id!==id);
  save('categories', cats);
  showSection('categories');
  toast('Kategori silindi.','success');
}

function closeCategoryModal(){
  document.getElementById('categoryModal').classList.remove('active');
}

        <div class="form-row single">

            <label>👍 Facebook URL</label>
            <input id="sFb" type="url" value="${s.facebook}" placeholder="https://facebook.com/sayfa">
          </div>
        </div>
        <div class="form-row single">
          <div class="field">
            <label>▶️ YouTube URL</label>
            <input id="sYt" type="url" value="${s.youtube}" placeholder="https://youtube.com/kanal">
          </div>
        </div>
        <button class="btn btn-primary-sm" onclick="saveSocial()">💾 Kaydet</button>
      </div>
    </div>
  `;
}

function saveSocial(){
  const s = defaultSettings();
  s.instagram = document.getElementById('sInsta').value;
  s.facebook = document.getElementById('sFb').value;
  s.youtube = document.getElementById('sYt').value;
  save('settings', s);
  toast('Sosyal medya hesapları kaydedildi.','success');
}

// ============================================================
// LOGO
// ============================================================
function renderLogo(){
  const logoData = load('logoImg','');
  return `
    <div class="section-title-bar"><h2>Logo & Görsel Ayarları</h2></div>
    <div class="panel">
      <div class="panel-body">
        <div class="logo-preview-area">
          ${logoData ? `<img id="logoPreviewImg" src="${logoData}" style="max-height:80px;max-width:220px;object-fit:contain;">` : '<p style="color:var(--text-muted);">Henüz logo yüklenmedi</p>'}
        </div>
        <div class="img-upload-area" onclick="document.getElementById('logoFileInput').click()">
          <input type="file" id="logoFileInput" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
          <div class="icon">🖼️</div>
          <p>Logo yüklemek için tıklayın<br><small style="color:var(--text-muted);">PNG şeffaf arka plan önerilir — Max 2MB</small></p>
        </div>
        ${logoData ? `<button class="btn btn-danger" style="margin-top:12px;" onclick="removeLogo()">🗑️ Logoyu Kaldır</button>` : ''}
      </div>
    </div>
  `;
}

function handleLogoUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024) { toast('Logo 2MB\'dan büyük olamaz.','error'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    save('logoImg', ev.target.result);
    showSection('logo');
    toast('Logo kaydedildi.','success');
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  if(!confirm('Logoyu kaldırmak istediğinize emin misiniz?')) return;
  save('logoImg','');
  showSection('logo');
  toast('Logo kaldırıldı.','success');
}

// ============================================================
// SECURITY
// ============================================================
function renderSecurity(){
  return `
    <div class="section-title-bar"><h2>Güvenlik Ayarları</h2></div>
    <div class="panel">
      <div class="panel-header"><h3>Şifre Değiştir</h3></div>
      <div class="panel-body">
        <div class="form-row single">
          <div class="field"><label>Mevcut Şifre</label><input id="secOld" type="password" placeholder="••••••••"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Yeni Şifre</label><input id="secNew" type="password" placeholder="••••••••"></div>
          <div class="field"><label>Yeni Şifre (Tekrar)</label><input id="secNew2" type="password" placeholder="••••••••"></div>
        </div>
        <button class="btn btn-primary-sm" onclick="changePassword()">🔒 Şifreyi Değiştir</button>
      </div>
    </div>
    <div class="panel" style="margin-top:16px;">
      <div class="panel-header"><h3>Kullanıcı Adı Değiştir</h3></div>
      <div class="panel-body">
        <div class="form-row single">
          <div class="field"><label>Yeni Kullanıcı Adı</label><input id="secUser" type="text" value="${load('adminCreds',{user:'admin'}).user}"></div>
        </div>
        <button class="btn btn-outline" onclick="changeUsername()">Kullanıcı Adını Güncelle</button>
      </div>
    </div>
  `;
}

function changePassword(){
  const creds = load('adminCreds', {user:'admin',pass:'dekorcum2025'});
  const old = document.getElementById('secOld').value;
  const n1 = document.getElementById('secNew').value;
  const n2 = document.getElementById('secNew2').value;
  if(old !== creds.pass) { toast('Mevcut şifre yanlış.','error'); return; }
  if(n1.length < 6) { toast('Yeni şifre en az 6 karakter olmalı.','error'); return; }
  if(n1 !== n2) { toast('Yeni şifreler eşleşmiyor.','error'); return; }
  creds.pass = n1;
  save('adminCreds', creds);
  toast('Şifre başarıyla değiştirildi.','success');
}

function changeUsername(){
  const creds = load('adminCreds', {user:'admin',pass:'dekorcum2025'});
  const u = document.getElementById('secUser').value.trim();
  if(!u) { toast('Kullanıcı adı boş olamaz.','error'); return; }
  creds.user = u;
  save('adminCreds', creds);
  document.getElementById('topbarUser').textContent = u;
  toast('Kullanıcı adı güncellendi.','success');
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='success'){
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `${type==='success'?'✅':'❌'} ${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{ el.style.animation='toastIn .3s ease reverse'; setTimeout(()=>el.remove(),300); }, 3000);
}
