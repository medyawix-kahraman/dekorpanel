<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dekor Panel — Admin Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gdark:#8B6914;--d:#0A0A0A;--d2:#111;--d3:#181818;--d4:#202020;--d5:#2A2A2A;--t:#E0D8CC;--m:#7A7060;--w:#F5F0E8;--green:#2ECC71;--red:#E74C3C;--blue:#3498DB;--sb:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--d);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* LOGIN */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a1208,#0A0A0A 70%);}
.lb{background:var(--d3);border:1px solid rgba(201,168,76,.18);padding:52px 44px;width:380px;border-radius:4px;text-align:center;}
.ll{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);margin-bottom:4px;}
.ls2{font-size:10px;letter-spacing:4px;color:var(--m);text-transform:uppercase;margin-bottom:32px;}
.fg{margin-bottom:13px;text-align:left;}
.fg label{display:block;font-size:11px;color:var(--m);letter-spacing:.4px;margin-bottom:7px;text-transform:uppercase;font-weight:600;}
.fc{width:100%;background:var(--d4);border:1px solid rgba(201,168,76,.12);color:var(--t);padding:11px 13px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .3s;}
.fc:focus{border-color:var(--gold);}
.bl{width:100%;background:linear-gradient(135deg,var(--gold),var(--gdark));color:#0A0A0A;border:none;padding:13px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:4px;margin-top:8px;}
.bl:hover{filter:brightness(1.1);}
.le{color:var(--red);font-size:12px;margin-top:9px;display:none;}

/* LAYOUT */
#app{display:none;}
.lay{display:flex;min-height:100vh;}

/* SIDEBAR */
.sb{width:var(--sb);background:var(--d2);border-right:1px solid rgba(201,168,76,.08);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
.sb-top{padding:22px 18px;border-bottom:1px solid rgba(201,168,76,.07);}
.sb-top .nm{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);}
.sb-top .sub{font-size:9px;color:var(--m);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
.sb-nav{padding:10px 0;flex:1;}
.nsec{padding:7px 16px;font-size:10px;color:var(--m);letter-spacing:2px;text-transform:uppercase;margin-top:5px;}
.ni{display:flex;align-items:center;gap:9px;padding:10px 18px;color:var(--m);cursor:pointer;transition:all .3s;font-size:13px;font-weight:500;border-left:3px solid transparent;}
.ni:hover{background:rgba(201,168,76,.04);color:var(--t);}
.ni.on{background:rgba(201,168,76,.07);color:var(--gold);border-left-color:var(--gold);}
.sb-bot{padding:12px 18px;border-top:1px solid rgba(201,168,76,.07);}
.blog{width:100%;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.22);color:var(--red);padding:9px;font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;border-radius:4px;}
.blog:hover{background:rgba(231,76,60,.16);}

/* MAIN */
.mn{margin-left:var(--sb);flex:1;}
.tb{background:var(--d2);border-bottom:1px solid rgba(201,168,76,.07);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-t{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--w);}
.tb-u{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.16);color:var(--gold);padding:5px 12px;border-radius:20px;font-size:11.5px;}
.body{padding:24px;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:var(--d3);border:1px solid rgba(201,168,76,.07);border-radius:4px;padding:20px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gdark));}
.sc .sl{font-size:10px;color:var(--m);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.sc .sv{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);}
.sc .sc2{font-size:11px;color:var(--green);margin-top:2px;}

/* PANEL */
.pnl{background:var(--d3);border:1px solid rgba(201,168,76,.07);border-radius:4px;margin-bottom:18px;}
.pnl-h{padding:16px 20px;border-bottom:1px solid rgba(201,168,76,.05);display:flex;align-items:center;justify-content:space-between;}
.pnl-h h3{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--w);}
.pnl-b{padding:20px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 13px;background:var(--d4);color:var(--m);font-size:10px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;text-align:left;white-space:nowrap;}
.tbl td{padding:12px 13px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle;}
.tbl tr:hover td{background:rgba(201,168,76,.02);}
.tthumb{width:44px;height:44px;background:var(--d5);border-radius:3px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.tthumb img{width:100%;height:100%;object-fit:cover;}
.bdg{padding:3px 8px;border-radius:2px;font-size:10px;font-weight:700;}
.bg{background:rgba(46,204,113,.12);color:var(--green);}
.br{background:rgba(231,76,60,.12);color:var(--red);}
.bb{background:rgba(52,152,219,.12);color:var(--blue);}
.bgold{background:rgba(201,168,76,.12);color:var(--gold);}

/* BUTTONS */
.btn{padding:7px 14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;border-radius:3px;transition:all .3s;display:inline-flex;align-items:center;gap:5px;}
.bp{background:linear-gradient(135deg,var(--gold),var(--gdark));color:#0A0A0A;}
.bp:hover{filter:brightness(1.1);}
.bo{background:transparent;border:1px solid rgba(201,168,76,.22);color:var(--gold);}
.bo:hover{background:rgba(201,168,76,.08);}
.bd{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.22);color:var(--red);}
.bd:hover{background:rgba(231,76,60,.16);}
.bsm{padding:5px 10px;font-size:11px;}

/* FORM */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
.fr3{grid-template-columns:1fr 1fr 1fr;}
.fr1{grid-template-columns:1fr;}
.fld{display:flex;flex-direction:column;gap:6px;}
.fld label{font-size:10px;color:var(--m);letter-spacing:.4px;text-transform:uppercase;font-weight:600;}
.fld input,.fld select,.fld textarea{background:var(--d4);border:1px solid rgba(201,168,76,.11);color:var(--t);padding:10px 12px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .3s;width:100%;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold);}
.fld select option{background:var(--d4);}
.fld textarea{resize:vertical;min-height:70px;}

/* TOGGLE */
.tgl{position:relative;width:42px;height:22px;cursor:pointer;display:inline-block;vertical-align:middle;}
.tgl input{display:none;}
.tsl{position:absolute;inset:0;background:var(--d5);border-radius:22px;transition:.3s;border:1px solid rgba(255,255,255,.07);}
.tsl::before{content:'';position:absolute;width:16px;height:16px;background:var(--m);border-radius:50%;left:2px;top:2px;transition:.3s;}
.tgl input:checked+.tsl{background:rgba(201,168,76,.18);border-color:var(--gold);}
.tgl input:checked+.tsl::before{transform:translateX(20px);background:var(--gold);}

/* IMAGE UPLOAD */
.imgup{border:2px dashed rgba(201,168,76,.2);border-radius:4px;background:var(--d4);min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;position:relative;}
.imgup:hover,.imgup.drag{border-color:var(--gold);background:rgba(201,168,76,.04);}
.imgup-ph{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;padding:16px;}
.imgup-ph svg{width:32px;height:32px;color:rgba(201,168,76,.2);}
.imgup-ph p{font-size:12.5px;color:var(--m);}
.imgup-ph small{font-size:11px;color:rgba(122,112,96,.5);}
.imgup-ph .selfbtn{margin-top:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.22);color:var(--gold);padding:6px 16px;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;border-radius:3px;}
.imgup-ph .selfbtn:hover{background:rgba(201,168,76,.18);}
.imgup-prev{display:none;flex-direction:column;align-items:center;gap:8px;padding:12px;width:100%;}
.imgup-prev img{max-width:100%;max-height:170px;object-fit:contain;border-radius:3px;}
.imgup-prev .rmbtn{background:rgba(231,76,60,.8);border:none;color:#fff;padding:5px 13px;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;}
.imgup-prev .rmbtn:hover{background:var(--red);}

/* COLOR CHIPS */
.cchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.cc{background:var(--d5);border:1px solid rgba(201,168,76,.11);color:var(--m);padding:3px 9px;border-radius:20px;font-size:11.5px;display:inline-flex;align-items:center;gap:4px;}
.cc .rm{color:var(--red);cursor:pointer;font-size:13px;line-height:1;}
.addcol{display:flex;gap:7px;margin-bottom:5px;}
.addcol input{flex:1;background:var(--d4);border:1px solid rgba(201,168,76,.11);color:var(--t);padding:8px 12px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;transition:border .3s;}
.addcol input:focus{border-color:var(--gold);}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.mb{background:var(--d3);border:1px solid rgba(201,168,76,.12);border-radius:4px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;}
.mh{padding:16px 20px;border-bottom:1px solid rgba(201,168,76,.07);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--d3);z-index:1;}
.mh h3{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--w);}
.mc{background:none;border:none;color:var(--m);font-size:20px;cursor:pointer;transition:color .3s;}
.mc:hover{color:var(--gold);}
.mbody{padding:20px;}
.mf{padding:13px 20px;border-top:1px solid rgba(201,168,76,.07);display:flex;justify-content:flex-end;gap:9px;}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sh h2{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--w);}

/* TOAST */
.tc{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--d3);border:1px solid rgba(201,168,76,.16);color:var(--t);padding:11px 16px;border-radius:4px;font-size:13px;display:flex;align-items:center;gap:8px;min-width:240px;animation:ti .3s ease;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.tok{border-color:rgba(46,204,113,.25);}
.terr{border-color:rgba(231,76,60,.25);}
@keyframes ti{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

@media(max-width:900px){.sb{transform:translateX(-100%);}.mn{margin-left:0;}.sg{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="ls">
  <div class="lb">
    <div class="ll">DEKOR PANEL</div>
    <div class="ls2">Admin Paneli</div>
    <div class="fg"><label>Kullanıcı Adı</label><input class="fc" type="text" id="lu" placeholder="admin" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="fg"><label>Şifre</label><input class="fc" type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="bl" onclick="login()">Giriş Yap</button>
    <div class="le" id="le">Kullanıcı adı veya şifre hatalı.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="lay">
    <aside class="sb">
      <div class="sb-top"><div class="nm" id="sbnm">DEKOR PANEL</div><div class="sub">Admin Paneli</div></div>
      <nav class="sb-nav">
        <div class="nsec">Genel</div>
        <div class="ni on" onclick="go('dash')">📊 Özet</div>
        <div class="nsec">Ürün Yönetimi</div>
        <div class="ni" onclick="go('prods')">📦 Ürünler</div>
        <div class="ni" onclick="go('cats')">🗂️ Kategoriler</div>
        <div class="nsec">İçerik</div>
        <div class="ni" onclick="go('camp')">🎯 Kampanya</div>
        <div class="ni" onclick="go('banners')">🎠 Slider Görselleri</div>
        <div class="ni" onclick="go('logo')">🖼️ Logo</div>
        <div class="nsec">Firma</div>
        <div class="ni" onclick="go('settings')">⚙️ Firma Bilgileri</div>
        <div class="ni" onclick="go('social')">📱 Sosyal Medya</div>
        <div class="nsec">Sistem</div>
        <div class="ni" onclick="go('sec')">🔒 Güvenlik</div>
        <div class="ni" onclick="window.open('index.html','_blank')">🌐 Siteyi Gör</div>
      </nav>
      <div class="sb-bot"><button class="blog" onclick="logout()">⬅ Çıkış</button></div>
    </aside>
    <main class="mn">
      <div class="tb"><div class="tb-t" id="tbt">Özet</div><span class="tb-u" id="tbu">admin</span></div>
      <div class="body" id="bd"></div>
    </main>
  </div>
</div>

<!-- MODALS -->
<div class="mo" id="pm" onclick="if(event.target===this)cpm()"><div class="mb"><div class="mh"><h3 id="pmtit">Ürün</h3><button class="mc" onclick="cpm()">✕</button></div><div class="mbody" id="pmb"></div><div class="mf"><button class="btn bo" onclick="cpm()">İptal</button><button class="btn bp" onclick="saveProd()">💾 Kaydet</button></div></div></div>
<div class="mo" id="cm" onclick="if(event.target===this)ccm()"><div class="mb"><div class="mh"><h3 id="cmtit">Kategori</h3><button class="mc" onclick="ccm()">✕</button></div><div class="mbody" id="cmb"></div><div class="mf"><button class="btn bo" onclick="ccm()">İptal</button><button class="btn bp" onclick="saveCat()">💾 Kaydet</button></div></div></div>
<div class="tc" id="tc"></div>

<script>
/* STORAGE */
function sv(k,v){localStorage.setItem('dk_'+k,JSON.stringify(v));}
function ld(k,fb){try{var d=localStorage.getItem('dk_'+k);return d?JSON.parse(d):fb;}catch(e){return fb;}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* DEFAULTS */
function DS(){return ld('settings',{brandName:'DEKOR PANEL',brandSub:'dekorpanel.com.tr',phone:'0542 646 12 65',whatsapp:'905426461265',email:'info@dekorpanel.com.tr',address:'Mimar Sinan Mh. Şht. Savcı Hakan Kılıç Cd. Mustafa Özsüllü Apt. No:56/A KONYA',instagram:'https://www.instagram.com/dekorcum_toptan',facebook:'https://www.facebook.com/Dekorcum-Yap%C4%B1-Dekorasyon-353565921947690',youtube:'',campaign:{active:true,title:'Bayi Kampanyası',desc:'Toptan alımlarda özel fiyatlar.',pct:'%15',label:'İndirim'},marqueeItems:['MDF Panel','Akustik Panel','Duvar Çıtası','Lambri','Bordür','Süpürgelik','Motifler','Toptan Satış']});}
function DC(){return ld('categories',[{id:1,name:'MDF Panel',slug:'mdf-panel',desc:'Dekoratif duvar panelleri'},{id:2,name:'Tavan & Duvar Lambri',slug:'lambri',desc:'Tavan ve duvar kaplamalar'},{id:3,name:'Duvar Çıtası',slug:'duvar-citasi',desc:'Her ölçüde duvar çıtaları'},{id:4,name:'Motifler',slug:'motifler',desc:'Dekoratif motifler'},{id:5,name:'Duvar Bordürleri',slug:'borduler',desc:'Klasik ve modern bordürler'},{id:6,name:'Süpürgelikler',slug:'supurgelik',desc:'PVC ve MDF süpürgelikler'},{id:7,name:'Akustik Panel',slug:'akustik',desc:'Ses ve ısı yalıtım panelleri'}]);}
function DP(){return ld('products',[{id:1,name:'DMP-ANADOLU CEVİZ MDF DUVAR PANELİ',code:'DMP-001',catId:1,price:300,oldPrice:350,unit:'boy',stock:100,badge:'İndirim',colors:['Ceviz','Beyaz'],desc:'1 boy için fiyatlandırılmıştır.',img:'',active:true},{id:2,name:'DP-OMEGA GÜMÜŞ EFEKTLİ SİYAH PANEL',code:'DP-002',catId:1,price:300,oldPrice:330,unit:'boy',stock:80,badge:'Yeni',colors:['Siyah','Gümüş'],desc:'Premium panel.',img:'',active:true},{id:3,name:'GOLD ALTIN DUVAR ÇITASI',code:'DC-001',catId:3,price:85,oldPrice:null,unit:'adet',stock:500,badge:'',colors:['Gold','Gümüş'],desc:'Dekoratif altın çıta.',img:'',active:true},{id:4,name:'AKUSTİK SES YALITIM PANELİ',code:'AK-001',catId:7,price:450,oldPrice:null,unit:'m²',stock:200,badge:'Yeni',colors:['Gri','Krem'],desc:'Ses ve ısı yalıtım.',img:'',active:true}]);}
function DBanners(){return ld('banners',[{id:0,label:'',img:''},{id:1,label:'',img:''},{id:2,label:'',img:''},{id:3,label:'',img:''}]);}

/* AUTH */
function login(){
  var cr=ld('adminCreds',{user:'admin',pass:'dekorcum2025'});
  var u=document.getElementById('lu').value.trim();
  var p=document.getElementById('lp').value;
  if(u===cr.user&&p===cr.pass){
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('tbu').textContent=u;
    document.getElementById('sbnm').textContent=DS().brandName;
    go('dash');
  }else{document.getElementById('le').style.display='block';}
}
function logout(){document.getElementById('ls').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('lp').value='';}

/* NAV */
var titles={dash:'📊 Özet',prods:'📦 Ürünler',cats:'🗂️ Kategoriler',camp:'🎯 Kampanya',banners:'🎠 Slider Görselleri',logo:'🖼️ Logo',settings:'⚙️ Firma Bilgileri',social:'📱 Sosyal Medya',sec:'🔒 Güvenlik'};
function go(name){
  document.querySelectorAll('.ni').forEach(function(el){el.classList.remove('on');});
  event&&event.currentTarget&&event.currentTarget.classList.add('on');
  document.getElementById('tbt').textContent=titles[name]||name;
  var b=document.getElementById('bd');
  if(name==='dash')b.innerHTML=rDash();
  else if(name==='prods')b.innerHTML=rProds();
  else if(name==='cats')b.innerHTML=rCats();
  else if(name==='camp')b.innerHTML=rCamp();
  else if(name==='banners')b.innerHTML=rBanners();
  else if(name==='logo')b.innerHTML=rLogo();
  else if(name==='settings')b.innerHTML=rSettings();
  else if(name==='social')b.innerHTML=rSocial();
  else if(name==='sec')b.innerHTML=rSec();
}

/* DASHBOARD */
function rDash(){
  var ps=DP(),cs=DC();
  return '<div class="sg">'+
  '<div class="sc"><div class="sl">Toplam Ürün</div><div class="sv">'+ps.length+'</div><div class="sc2">Aktif: '+ps.filter(function(p){return p.active;}).length+'</div></div>'+
  '<div class="sc"><div class="sl">Kategori</div><div class="sv">'+cs.length+'</div><div class="sc2">Tümü aktif</div></div>'+
  '<div class="sc"><div class="sl">Stokta</div><div class="sv">'+ps.filter(function(p){return p.stock>0;}).length+'</div><div class="sc2">Mevcut</div></div>'+
  '<div class="sc"><div class="sl">Kampanya</div><div class="sv" style="font-size:16px;">'+(DS().campaign.active?'Aktif':'Pasif')+'</div><div class="sc2" '+(DS().campaign.active?'':'style="color:var(--red);"')+'>'+(DS().campaign.active?'Yayında':'Kapalı')+'</div></div>'+
  '</div>'+
  '<div class="pnl"><div class="pnl-h"><h3>Son Ürünler</h3><button class="btn bo bsm" onclick="go(\'prods\')">Tümünü Gör</button></div>'+
  '<div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>Görsel</th><th>Ürün</th><th>Kod</th><th>Fiyat</th><th>Durum</th></tr></thead><tbody>'+

/* IMAGE UPLOAD - CORE */
function fileChg(evt,b64id,previd,imgid,phid){
  var file=evt.target.files[0];if(!file)return;
  readImg(file,b64id,previd,imgid,phid);
}
function readImg(file,b64id,previd,imgid,phid){
  if(!file.type.match(/^image\//)){toast('Sadece görsel dosyası yükleyin.','err');return;}
  if(file.size>5242880){toast('Görsel 5MB\'dan büyük olamaz.','err');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var data=e.target.result;
    document.getElementById(b64id).value=data;
    showPrev(previd,imgid,phid,data);
    toast('Görsel yüklendi ✓','ok');
  };
  reader.onerror=function(){toast('Dosya okunamadı, tekrar deneyin.','err');};
  reader.readAsDataURL(file);
}
function showPrev(previd,imgid,phid,src){
  var prev=document.getElementById(previd);
  var img=document.getElementById(imgid);
  var ph=document.getElementById(phid);
  if(img)img.src=src;
  if(prev)prev.style.display='flex';
  if(ph)ph.style.display='none';
}
function rmImg(b64id,previd,phid,fileid){
  document.getElementById(b64id).value='';
  var prev=document.getElementById(previd);if(prev){prev.style.display='none';var img=prev.querySelector('img');if(img)img.src='';}
  var ph=document.getElementById(phid);if(ph)ph.style.display='flex';
  var fi=document.getElementById(fileid);if(fi)fi.value='';
}
function dov(e){e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('drag');}
function dlv(e){e.stopPropagation();e.currentTarget.classList.remove('drag');}
function ddr(e,b64id,previd,imgid){
  e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drag');
  var f=e.dataTransfer.files[0];if(!f)return;
  /* find phid from parent */
  var ph=e.currentTarget.querySelector('.imgup-ph');
  var phid=ph?ph.id:'imgph';
  readImg(f,b64id,previd,imgid,phid);
}

function bFileChg(evt,i){
  var file=evt.target.files[0];if(!file)return;
  readBanner(file,i);
}
function readBanner(file,i){
  if(!file.type.match(/^image\//)){toast('Sadece görsel yükleyin.','err');return;}
  if(file.size>3145728){toast('Görsel 3MB\'dan büyük olamaz.','err');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var data=e.target.result;
    document.getElementById('bb64_'+i).value=data;
    showPrev('bprev'+i,'bpimg'+i,'bph'+i,data);
    toast('Slayt '+(i+1)+' görseli yüklendi ✓','ok');
  };
  reader.onerror=function(){toast('Dosya okunamadı.','err');};
  reader.readAsDataURL(file);
}
function ddrB(e,i){
  e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drag');
  var f=e.dataTransfer.files[0];if(!f)return;
  readBanner(f,i);
}
function rmBanner(i){
  var banners=DBanners();banners[i].img='';sv('banners',banners);
  document.getElementById('bb64_'+i).value='';
  var prev=document.getElementById('bprev'+i);if(prev)prev.style.display='none';
  var ph=document.getElementById('bph'+i);if(ph)ph.style.display='flex';
  var fi=document.getElementById('bfi'+i);if(fi)fi.value='';
  toast('Slayt '+(i+1)+' görseli kaldırıldı.','ok');
}
function saveBanners(){
  var banners=DBanners();
  var changed=false;
  for(var i=0;i<4;i++){
    var lbl=document.getElementById('blbl'+i);
    var b64=document.getElementById('bb64_'+i);
    if(lbl)banners[i].label=lbl.value;
    if(b64&&b64.value&&b64.value!=='[SAVED]'){banners[i].img=b64.value;changed=true;}
    else if(b64&&b64.value===''){banners[i].img='';}
  }
  sv('banners',banners);
  toast('Slider görselleri kaydedildi! Siteyi yenileyince görünecek.','ok');
}

function rLogo(){
  var logo=ld('logoImg','');
  return '<div class="sh"><h2>Logo Yükle</h2></div>'+
  '<div class="pnl"><div class="pnl-b">'+
  '<p style="color:var(--m);font-size:13px;margin-bottom:14px;">PNG şeffaf arka plan önerilir. Maks. 2MB. Logo yüklendikten sonra siteyi yenileyin.</p>'+
  '<div style="background:var(--d4);border:1px solid rgba(201,168,76,.1);padding:18px;text-align:center;min-height:90px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;" id="lgprev">'+
  (logo?'<img src="'+logo+'" style="max-height:72px;max-width:200px;object-fit:contain;">':'<span style="color:var(--m);font-size:13px;">Henüz logo yüklenmedi</span>')+
  '</div>'+
  '<div class="imgup" id="lgup" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="ddrLg(event)" style="min-height:120px;">'+
  '<div class="imgup-ph">'+
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'+
  '<p>Logoyu buraya sürükleyin</p><small>PNG şeffaf arka plan — Max 2MB</small>'+
  '<button type="button" class="selfbtn" onclick="document.getElementById(\'lgfi\').click()">📂 Dosya Seç</button>'+
  '</div></div>'+
  '<input type="file" id="lgfi" accept="image/*" style="display:none" onchange="lgFileChg(event)">'+
  (logo?'<button class="btn bd" style="margin-top:12px;" onclick="rmLogo()">🗑️ Logoyu Kaldır</button>':'')+
  '</div></div>';
}
function lgFileChg(e){var f=e.target.files[0];if(!f)return;readLogo(f);}
function ddrLg(e){e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drag');var f=e.dataTransfer.files[0];if(!f)return;readLogo(f);}
function readLogo(file){
  if(!file.type.match(/^image\//)){toast('Sadece görsel yükleyin.','err');return;}
  if(file.size>2097152){toast('Logo 2MB\'dan büyük olamaz.','err');return;}
  var reader=new FileReader();
  reader.onload=function(e){sv('logoImg',e.target.result);go('logo');toast('Logo kaydedildi! Siteyi yenileyince görünecek.','ok');};
  reader.onerror=function(){toast('Dosya okunamadı.','err');};
  reader.readAsDataURL(file);
}
function rmLogo(){if(!confirm('Logoyu kaldır?'))return;sv('logoImg','');go('logo');toast('Logo kaldırıldı.','ok');}

function chgPass(){var cr=ld('adminCreds',{user:'admin',pass:'dekorcum2025'});var o=document.getElementById('sold').value;var n1=document.getElementById('snew').value;var n2=document.getElementById('snew2').value;if(o!==cr.pass){toast('Mevcut şifre yanlış.','err');return;}if(n1.length<6){toast('En az 6 karakter.','err');return;}if(n1!==n2){toast('Şifreler eşleşmiyor.','err');return;}cr.pass=n1;sv('adminCreds',cr);toast('Şifre değiştirildi.','ok');}
function chgUser(){var cr=ld('adminCreds',{user:'admin',pass:'dekorcum2025'});var u=document.getElementById('susr').value.trim();if(!u){toast('Boş bırakılamaz.','err');return;}cr.user=u;sv('adminCreds',cr);document.getElementById('tbu').textContent=u;toast('Kullanıcı adı güncellendi.','ok');}

/* TOAST */
function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast '+(type==='ok'?'tok':'terr');
  el.innerHTML=(type==='ok'?'✅':'❌')+' '+msg;
  document.getElementById('tc').appendChild(el);
  setTimeout(function(){el.style.animation='ti .3s ease reverse';setTimeout(function(){el.remove();},300);},3000);
}
