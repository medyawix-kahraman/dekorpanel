<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dekorcum Admin Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-dark:#8B6914;--gold-light:#E8C97A;
  --dark:#0A0A0A;--dark2:#111;--dark3:#181818;--dark4:#202020;--dark5:#2A2A2A;
  --text:#E0D8CC;--muted:#7A7060;--white:#F5F0E8;
  --green:#2ECC71;--red:#E74C3C;--blue:#3498DB;--orange:#E67E22;
  --sb:250px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a1208 0%,#0A0A0A 70%);}
.login-box{background:var(--dark3);border:1px solid rgba(201,168,76,.18);padding:52px 44px;width:400px;border-radius:4px;text-align:center;}
.l-logo{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);margin-bottom:4px;}
.l-sub{font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:36px;}
.l-box h2{font-size:14px;color:var(--muted);margin-bottom:26px;font-weight:400;}
.fg{margin-bottom:14px;text-align:left;}
.fg label{display:block;font-size:11px;color:var(--muted);letter-spacing:.4px;margin-bottom:7px;text-transform:uppercase;font-weight:600;}
.fc{width:100%;background:var(--dark4);border:1px solid rgba(201,168,76,.12);color:var(--text);padding:12px 14px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .3s;}
.fc:focus{border-color:var(--gold);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0A0A;border:none;padding:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13.5px;letter-spacing:.8px;cursor:pointer;border-radius:4px;margin-top:8px;transition:filter .3s;}
.btn-login:hover{filter:brightness(1.1);}
.l-err{color:var(--red);font-size:12.5px;margin-top:10px;display:none;}

/* LAYOUT */
#adminApp{display:none;}
.layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sb{width:var(--sb);background:var(--dark2);border-right:1px solid rgba(201,168,76,.08);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
.sb-brand{padding:24px 20px;border-bottom:1px solid rgba(201,168,76,.07);}
.sb-brand .nm{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--gold);}
.sb-brand .sb2{font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
.sb-nav{padding:12px 0;flex:1;}
.nav-sec{padding:8px 18px;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.ni{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--muted);cursor:pointer;transition:all .3s;font-size:13.5px;font-weight:500;border-left:3px solid transparent;}
.ni:hover{background:rgba(201,168,76,.04);color:var(--text);}
.ni.on{background:rgba(201,168,76,.07);color:var(--gold);border-left-color:var(--gold);}
.ni .ic{width:16px;text-align:center;font-size:14px;}
.sb-bot{padding:14px 20px;border-top:1px solid rgba(201,168,76,.07);}
.btn-logout{width:100%;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);color:var(--red);padding:9px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;border-radius:4px;transition:all .3s;}
.btn-logout:hover{background:rgba(231,76,60,.18);}

/* MAIN */
.adm-main{margin-left:var(--sb);flex:1;}
.topbar{background:var(--dark2);border-bottom:1px solid rgba(201,168,76,.07);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--white);}
.tb-badge{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);color:var(--gold);padding:5px 13px;border-radius:20px;font-size:12px;}
.adm-body{padding:28px;}

/* CARDS */
.stats-g{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat{background:var(--dark3);border:1px solid rgba(201,168,76,.07);border-radius:4px;padding:22px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-dark));}
.stat .lbl{font-size:10.5px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:9px;}
.stat .val{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);margin-bottom:3px;}
.stat .ch{font-size:11.5px;color:var(--green);}
.stat .sico{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:36px;opacity:.12;}

/* PANEL */
.panel{background:var(--dark3);border:1px solid rgba(201,168,76,.07);border-radius:4px;margin-bottom:20px;}
.panel-hd{padding:18px 22px;border-bottom:1px solid rgba(201,168,76,.05);display:flex;align-items:center;justify-content:space-between;}
.panel-hd h3{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--white);}
.panel-body{padding:22px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:11px 14px;background:var(--dark4);color:var(--muted);font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;text-align:left;white-space:nowrap;}
.tbl td{padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13.5px;vertical-align:middle;}
.tbl tr:hover td{background:rgba(201,168,76,.02);}
.tbl-thumb{width:46px;height:46px;background:var(--dark5);border-radius:3px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.tbl-thumb img{width:100%;height:100%;object-fit:cover;}
.bdg{padding:3px 9px;border-radius:2px;font-size:10.5px;font-weight:700;display:inline-block;}
.bdg-g{background:rgba(46,204,113,.12);color:var(--green);}
.bdg-r{background:rgba(231,76,60,.12);color:var(--red);}
.bdg-gold{background:rgba(201,168,76,.12);color:var(--gold);}
.bdg-b{background:rgba(52,152,219,.12);color:var(--blue);}

/* BUTTONS */
.btn{padding:7px 16px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12.5px;border-radius:3px;transition:all .3s;display:inline-flex;align-items:center;gap:5px;}
.btn-p{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0A0A;}
.btn-p:hover{filter:brightness(1.1);}
.btn-out{background:transparent;border:1px solid rgba(201,168,76,.25);color:var(--gold);}
.btn-out:hover{background:rgba(201,168,76,.08);}
.btn-del{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);color:var(--red);}
.btn-del:hover{background:rgba(231,76,60,.18);}
.btn-sm{padding:5px 11px;font-size:12px;}

/* FORM */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.fr.t3{grid-template-columns:1fr 1fr 1fr;}
.fr.s{grid-template-columns:1fr;}
.fld{display:flex;flex-direction:column;gap:6px;}
.fld label{font-size:10.5px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;font-weight:600;}
.fld input,.fld select,.fld textarea{background:var(--dark4);border:1px solid rgba(201,168,76,.12);color:var(--text);padding:10px 12px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border .3s;width:100%;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold);}
.fld select option{background:var(--dark4);}
.fld textarea{resize:vertical;min-height:76px;}

/* TOGGLE */
.tgl{position:relative;width:44px;height:22px;cursor:pointer;display:inline-block;}
.tgl input{display:none;}
.tgl-sl{position:absolute;inset:0;background:var(--dark5);border-radius:22px;transition:.3s;border:1px solid rgba(255,255,255,.08);}
.tgl-sl::before{content:'';position:absolute;width:16px;height:16px;background:var(--muted);border-radius:50%;left:3px;top:2px;transition:.3s;}
.tgl input:checked+.tgl-sl{background:rgba(201,168,76,.18);border-color:var(--gold);}
.tgl input:checked+.tgl-sl::before{transform:translateX(22px);background:var(--gold);}

/* IMAGE UPLOAD — DRAG & DROP */
.img-drop{border:2px dashed rgba(201,168,76,.18);border-radius:4px;text-align:center;cursor:pointer;transition:all .3s;position:relative;background:var(--dark4);min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none;}
.img-drop:hover,.img-drop.drag{border-color:var(--gold);background:rgba(201,168,76,.04);}
.img-drop .drop-ph{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.img-drop .drop-ph svg{width:36px;height:36px;color:rgba(201,168,76,.25);}
.img-drop .drop-ph p{font-size:13px;color:var(--muted);}
.img-drop .drop-ph small{font-size:11px;color:rgba(122,112,96,.6);}
.img-preview-wrap{width:100%;display:none;flex-direction:column;align-items:center;gap:10px;padding:12px;}
.img-preview-wrap img{max-width:100%;max-height:180px;object-fit:contain;border-radius:4px;display:block;}
.img-preview-wrap .rm-img{background:rgba(231,76,60,.8);border:none;color:#fff;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:background .2s;}
.img-preview-wrap .rm-img:hover{background:var(--red);}
.drop-click-btn{margin-top:8px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:var(--gold);padding:7px 18px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:4px;pointer-events:all;}
.drop-click-btn:hover{background:rgba(201,168,76,.2);}

/* COLOR CHIPS */
.color-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;}
.cchip{background:var(--dark5);border:1px solid rgba(201,168,76,.12);color:var(--muted);padding:3px 10px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:5px;}
.cchip .rm{color:var(--red);cursor:pointer;font-size:14px;line-height:1;}
.add-color{display:flex;gap:7px;margin-bottom:4px;}
.add-color input{flex:1;background:var(--dark4);border:1px solid rgba(201,168,76,.12);color:var(--text);padding:9px 12px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .3s;}
.add-color input:focus{border-color:var(--gold);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid rgba(201,168,76,.08);margin-bottom:22px;}
.tab{padding:11px 22px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .3s;letter-spacing:.4px;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}

/* MODAL */
.m-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;padding:16px;}
.m-overlay.open{display:flex;}
.m-box{background:var(--dark3);border:1px solid rgba(201,168,76,.13);border-radius:4px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;}
.m-hd{padding:18px 22px;border-bottom:1px solid rgba(201,168,76,.07);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--dark3);z-index:1;}
.m-hd h3{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--white);}
.m-close{background:none;border:none;color:var(--muted);font-size:21px;cursor:pointer;transition:color .3s;line-height:1;}
.m-close:hover{color:var(--gold);}
.m-body{padding:22px;}
.m-foot{padding:14px 22px;border-top:1px solid rgba(201,168,76,.07);display:flex;justify-content:flex-end;gap:10px;}

/* LOGO PREVIEW */
.logo-prev{background:var(--dark4);border:1px solid rgba(201,168,76,.12);border-radius:4px;padding:20px;text-align:center;min-height:100px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.logo-prev img{max-height:72px;max-width:180px;object-fit:contain;}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.sec-hd h2{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--white);}

/* TOAST */
.toast-c{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--dark3);border:1px solid rgba(201,168,76,.18);color:var(--text);padding:12px 18px;border-radius:4px;font-size:13.5px;display:flex;align-items:center;gap:9px;min-width:260px;animation:tIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.toast.ok{border-color:rgba(46,204,113,.28);}
.toast.err{border-color:rgba(231,76,60,.28);}
@keyframes tIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

@media(max-width:900px){
  .sb{transform:translateX(-100%);transition:transform .3s;}
  .sb.open{transform:translateX(0);}
  .adm-main{margin-left:0;}
  .stats-g{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box l-box">
    <div class="l-logo" id="loginBrand">DEKORCUM</div>
    <div class="l-sub">Admin Paneli</div>
    <h2>Giriş yapın</h2>
    <div class="fg"><label>Kullanıcı Adı</label><input class="fc" type="text" id="lUser" placeholder="admin"></div>
    <div class="fg"><label>Şifre</label><input class="fc" type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div class="l-err" id="lErr">Kullanıcı adı veya şifre hatalı.</div>
  </div>
</div>

<!-- APP -->
<div id="adminApp">
  <div class="layout">
    <aside class="sb" id="sidebar">
      <div class="sb-brand">
        <div class="nm" id="sbBrand">DEKORCUM</div>
        <div class="sb2">Admin Paneli</div>
      </div>
      <nav class="sb-nav">
        <div class="nav-sec">Genel</div>
        <div class="ni on" onclick="sec('dashboard')"><span class="ic">📊</span> Özet</div>
        <div class="nav-sec">Ürün Yönetimi</div>
        <div class="ni" onclick="sec('products')"><span class="ic">📦</span> Ürünler</div>
        <div class="ni" onclick="sec('categories')"><span class="ic">🗂️</span> Kategoriler</div>
        <div class="nav-sec">İçerik</div>
        <div class="ni" onclick="sec('campaign')"><span class="ic">🎯</span> Kampanya</div>
        <div class="ni" onclick="sec('settings')"><span class="ic">⚙️</span> Firma Bilgileri</div>
        <div class="ni" onclick="sec('social')"><span class="ic">📱</span> Sosyal Medya</div>
        <div class="ni" onclick="sec('logo')"><span class="ic">🖼️</span> Logo Yükle</div>
        <div class="ni" onclick="sec('banners')"><span class="ic">🎠</span> Slider Görselleri</div>
        <div class="nav-sec">Sistem</div>
        <div class="ni" onclick="sec('security')"><span class="ic">🔒</span> Güvenlik</div>
        <div class="ni" onclick="window.open('index.html','_blank')"><span class="ic">🌐</span> Siteyi Gör</div>
      </nav>
      <div class="sb-bot"><button class="btn-logout" onclick="doLogout()">⬅ Çıkış</button></div>
    </aside>

    <main class="adm-main">
      <div class="topbar">
        <div class="tb-title" id="tbTitle">Özet</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="tb-badge" id="tbUser">admin</span>
        </div>
      </div>
      <div class="adm-body" id="admBody"></div>
    </main>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="m-overlay" id="pModal" onclick="if(event.target===this)closePM()">
  <div class="m-box">
    <div class="m-hd"><h3 id="pMTitle">Ürün Ekle</h3><button class="m-close" onclick="closePM()">✕</button></div>
    <div class="m-body" id="pMBody"></div>
    <div class="m-foot"><button class="btn btn-out" onclick="closePM()">İptal</button><button class="btn btn-p" onclick="saveProduct()">💾 Kaydet</button></div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="m-overlay" id="cModal" onclick="if(event.target===this)closeCM()">
  <div class="m-box">
    <div class="m-hd"><h3 id="cMTitle">Kategori Ekle</h3><button class="m-close" onclick="closeCM()">✕</button></div>
    <div class="m-body" id="cMBody"></div>
    <div class="m-foot"><button class="btn btn-out" onclick="closeCM()">İptal</button><button class="btn btn-p" onclick="saveCategory()">💾 Kaydet</button></div>
  </div>
</div>

<div class="toast-c" id="toastC"></div>

<script>
/* ── STORAGE ── */
function sv(k,v){localStorage.setItem('dk_'+k,JSON.stringify(v));}
function ld(k,fb){try{const d=localStorage.getItem('dk_'+k);return d?JSON.parse(d):fb;}catch(e){return fb;}}

function defS(){return ld('settings',{brandName:'DEKORCUM',brandSub:'Yapı & Dekorasyon',phone:'0542 646 12 65',whatsapp:'905426461265',email:'info@dekorcum.com',address:'Mimar Sinan Mh. Şht. Savcı Hakan Kılıç Cd. Mustafa Özsüllü Apt. No:56/A KONYA',instagram:'https://instagram.com/dekorcum_toptan',facebook:'https://facebook.com/dekorcum',youtube:'',campaign:{active:true,title:'Bayi Kampanyası',desc:'Toptan alımlarda özel fiyatlar.',pct:'%15',label:'İndirim'},marqueeItems:['MDF Panel','Akustik Panel','Duvar Çıtası','Lambri','Bordür','Süpürgelik','Motifler','Toptan Satış']});}
function defC(){return ld('categories',[{id:1,name:'MDF Panel',slug:'mdf-panel',desc:'Dekoratif duvar panelleri'},{id:2,name:'Tavan & Duvar Lambri',slug:'lambri',desc:'Tavan ve duvar kaplamalar'},{id:3,name:'Duvar Çıtası',slug:'duvar-citasi',desc:'Her ölçüde duvar çıtaları'},{id:4,name:'Motifler',slug:'motifler',desc:'Dekoratif motifler'},{id:5,name:'Duvar Bordürleri',slug:'borduler',desc:'Klasik ve modern bordürler'},{id:6,name:'Süpürgelikler',slug:'supurgelik',desc:'PVC ve MDF süpürgelikler'},{id:7,name:'Akustik Panel',slug:'akustik',desc:'Ses ve ısı yalıtım panelleri'}]);}
function defP(){return ld('products',[{id:1,name:'DMP-ANADOLU CEVİZ MDF DUVAR PANELİ',code:'DMP-001',catId:1,price:300,oldPrice:350,unit:'boy',stock:100,badge:'İndirim',colors:['Ceviz','Beyaz'],desc:'1 boy için fiyatlandırılmıştır.',img:'',active:true},{id:2,name:'DP-OMEGA GÜMÜŞ EFEKTLİ SİYAH PANEL',code:'DP-002',catId:1,price:300,oldPrice:330,unit:'boy',stock:80,badge:'Yeni',colors:['Siyah','Gümüş'],desc:'Neme ve suya dayanıklı.',img:'',active:true},{id:3,name:'GOLD ALTIN DUVAR ÇITASI',code:'DC-001',catId:3,price:85,oldPrice:null,unit:'adet',stock:500,badge:'',colors:['Gold','Gümüş'],desc:'Dekoratif altın duvar çıtası.',img:'',active:true},{id:4,name:'AKUSTİK SES YALITIM PANELİ',code:'AK-001',catId:7,price:450,oldPrice:null,unit:'m²',stock:200,badge:'Yeni',colors:['Gri','Krem'],desc:'Profesyonel ses ve ısı yalıtım.',img:'',active:true}]);}

/* ── AUTH ── */
function doLogin(){
  const creds=ld('adminCreds',{user:'admin',pass:'dekorcum2025'});
  const u=document.getElementById('lUser').value.trim();
  const p=document.getElementById('lPass').value;
  if(u===creds.user&&p===creds.pass){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='block';
    document.getElementById('tbUser').textContent=u;
    const s=defS();document.getElementById('sbBrand').textContent=s.brandName;
    sec('dashboard');
  }else{document.getElementById('lErr').style.display='block';}
}
function doLogout(){document.getElementById('loginScreen').style.display='flex';document.getElementById('adminApp').style.display='none';document.getElementById('lPass').value='';}

/* ── SECTION ROUTING ── */
const titles={dashboard:'📊 Özet',products:'📦 Ürünler',categories:'🗂️ Kategoriler',campaign:'🎯 Kampanya',settings:'⚙️ Firma Bilgileri',social:'📱 Sosyal Medya',logo:'🖼️ Logo Yükle',banners:'🎠 Slider Görselleri',security:'🔒 Güvenlik'};
function sec(name){
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('on'));
  event&&event.currentTarget&&event.currentTarget.classList.add('on');
  document.getElementById('tbTitle').textContent=titles[name]||name;
  const b=document.getElementById('admBody');
  if(name==='dashboard')b.innerHTML=rDash();
  else if(name==='products')b.innerHTML=rProducts();
  else if(name==='categories')b.innerHTML=rCategories();
  else if(name==='campaign')b.innerHTML=rCampaign();

function saveProduct(){
  const name=document.getElementById('pN').value.trim();
  const code=document.getElementById('pC').value.trim();
  const price=parseFloat(document.getElementById('pPr').value);
  const oldPrice=parseFloat(document.getElementById('pOP').value)||null;
  const catId=parseInt(document.getElementById('pCat').value);
  const unit=document.getElementById('pU').value;

  const desc=document.getElementById('pDesc').value.trim();

  if(!name||!code||!price){toast('Ad, kod ve fiyat zorunludur.','err');return;}
  let ps=defP();
  if(editPid){
    const i=ps.findIndex(p=>p.id===editPid);
    if(i>-1)ps[i]={...ps[i],name,code,price,oldPrice,catId,unit,badge,active,desc,img,stock,colors:curColors};
  }else{

    ps.push({id:nid,name,code,price,oldPrice,catId,unit,badge,active,desc,img,stock,colors:curColors});

}

/* ── IMAGE UPLOAD ── */
function triggerFileInput(inputId){
  document.getElementById(inputId).click();
}

function handleFileInput(evt,b64Id,prevId,imgId){
  const file=evt.target.files[0];if(!file)return;
  readImageFile(file,b64Id,prevId,imgId);
}

function readImageFile(file,b64Id,prevId,imgId){
  if(!file.type.startsWith('image/')){toast('Sadece görsel dosyası yükleyebilirsiniz.','err');return;}
  if(file.size>5*1024*1024){toast('Görsel 5MB\'dan büyük olamaz.','err');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const data=e.target.result;
    document.getElementById(b64Id).value=data;
    showPreview(prevId,imgId,data);
    toast('Görsel yüklendi ✓','ok');
  };
  reader.onerror=function(){toast('Görsel okunamadı, tekrar deneyin.','err');};
  reader.readAsDataURL(file);
}

function showPreview(prevId,imgId,src){
  const wrap=document.getElementById(prevId);
  const img=document.getElementById(imgId);
  if(!wrap||!img)return;
  img.src=src;
  wrap.style.display='flex';
  const ph=wrap.closest('.img-drop');
  if(ph){const d=ph.querySelector('.drop-ph');if(d)d.style.display='none';}
}

function removeImgPreview(b64Id,prevId){
  document.getElementById(b64Id).value='';
  const wrap=document.getElementById(prevId);
  if(wrap){
    wrap.style.display='none';
    const img=wrap.querySelector('img');if(img)img.src='';
    const drop=wrap.closest('.img-drop');
    if(drop){const ph=drop.querySelector('.drop-ph');if(ph)ph.style.display='flex';}
  }
  // reset file input if exists
  const fi=document.getElementById('pImgFile');if(fi)fi.value='';
  const lf=document.getElementById('logoFile');if(lf)lf.value='';
}

function onDragOver(e){e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('drag');}
function onDragLeave(e){e.stopPropagation();e.currentTarget.classList.remove('drag');}
function onDrop(e,b64Id,prevId,imgId){
  e.preventDefault();e.stopPropagation();
  e.currentTarget.classList.remove('drag');
  const file=e.dataTransfer.files[0];if(!file)return;
  readImageFile(file,b64Id,prevId,imgId);
}

    <div class="fr s"><div class="fld"><label>📸 Instagram URL</label><input id="sIn" type="url" value="${esc(s.instagram)}" placeholder="https://instagram.com/hesap"></div></div>
    <div class="fr s"><div class="fld"><label>👍 Facebook URL</label><input id="sFb" type="url" value="${esc(s.facebook)}" placeholder="https://facebook.com/sayfa"></div></div>
    <div class="fr s"><div class="fld"><label>▶️ YouTube URL</label><input id="sYt" type="url" value="${esc(s.youtube)}" placeholder="https://youtube.com/kanal"></div></div>
    <button class="btn btn-p" onclick="saveSocial()">💾 Kaydet</button>
  </div></div>`;
}
function saveSocial(){const s=defS();s.instagram=document.getElementById('sIn').value;s.facebook=document.getElementById('sFb').value;s.youtube=document.getElementById('sYt').value;sv('settings',s);toast('Sosyal medya kaydedildi.','ok');}

/* ── LOGO ── */
function rLogo(){
  const logoData=ld('logoImg','');
  return`
  <div class="sec-hd"><h2>Logo Yükle</h2></div>
  <div class="panel"><div class="panel-body">
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">PNG formatında, şeffaf arka planlı logo önerilir. Maksimum 2MB.</p>
    <div class="logo-prev" id="logoPrev" style="min-height:120px;">
      ${logoData?`<img src="${logoData}" style="max-height:80px;max-width:220px;object-fit:contain;">`:'<span style="color:var(--muted);font-size:13px;">Henüz logo yüklenmedi</span>'}
    </div>
    <div class="img-drop" id="logoDrop" style="min-height:130px;margin-bottom:12px;"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDropLogo(event)">
      <div class="drop-ph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Logoyu buraya sürükleyin</p>
        <small>PNG şeffaf arka plan önerilir — Max 2MB</small>
        <button type="button" class="drop-click-btn" onclick="triggerFileInput('logoFile')">📂 Dosya Seç</button>
      </div>
    </div>
    <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="handleLogoFile(event)">
    ${logoData?`<button class="btn btn-del" onclick="removeLogo()">🗑️ Logoyu Kaldır</button>`:''}
  </div></div>`;
}
function handleLogoFile(e){
  const file=e.target.files[0];if(!file)return;
  processLogoFile(file);
}
function onDropLogo(e){
  e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drag');
  const file=e.dataTransfer.files[0];if(!file)return;
  processLogoFile(file);
}
function processLogoFile(file){
  if(!file.type.startsWith('image/')){toast('Sadece görsel dosyası yükleyin.','err');return;}
  if(file.size>2*1024*1024){toast('Logo 2MB\'dan büyük olamaz.','err');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    sv('logoImg',e.target.result);
    sec('logo');
    toast('Logo kaydedildi! Siteyi yenileyince görünecek.','ok');
  };
  reader.onerror=function(){toast('Dosya okunamadı.','err');};
  reader.readAsDataURL(file);
}
function removeLogo(){if(!confirm('Logoyu kaldır?'))return;sv('logoImg','');sec('logo');toast('Logo kaldırıldı.','ok');}

/* ── BANNERS ── */
function rBanners(){
  const banners=ld('banners',[{id:1,label:'',img:''},{id:2,label:'',img:''},{id:3,label:'',img:''},{id:4,label:'',img:''}]);
  const slots=banners.map((b,i)=>`
    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-hd"><h3>Slayt ${i+1}</h3></div>
      <div class="panel-body">
        <div class="fld" style="margin-bottom:12px;">
          <label>Slayt Başlığı / Açıklama</label>
          <input id="blbl${i}" type="text" value="${esc(b.label)}" placeholder="Örn: MDF Panel Koleksiyonu">
        </div>
        <div class="fld">
          <label>Slayt Görseli</label>
          <div class="img-drop" id="bdrop${i}" style="min-height:140px;"
            ondragover="onDragOver(event)" ondragleave="onDragLeave(event)"
            ondrop="onDrop(event,'bb64_${i}','bprev${i}','bprevimg${i}')">
            <div class="drop-ph" id="bph${i}" ${b.img?'style="display:none"':''}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <p>Görseli sürükleyin veya seçin</p>
              <small>Önerilen: 800×500px — Max 3MB</small>
              <button type="button" class="drop-click-btn" onclick="triggerFileInput('bfile${i}')">📂 Dosya Seç</button>
            </div>
            <div class="img-preview-wrap" id="bprev${i}" style="${b.img?'display:flex':'display:none'}">
              <img id="bprevimg${i}" src="${b.img||''}" alt="">
              <button type="button" class="rm-img" onclick="removeBannerImg(${i})">🗑️ Görseli Kaldır</button>
            </div>
          </div>
          <input type="file" id="bfile${i}" accept="image/*" style="display:none" onchange="handleBannerFile(event,${i})">
          <input type="hidden" id="bb64_${i}" value="${b.img||''}">
        </div>
      </div>
    </div>`).join('');
  return`
  <div class="sec-hd"><h2>Slider Görselleri</h2></div>
  <p style="color:var(--muted);font-size:13px;margin-bottom:20px;">Ana sayfa hero slider'ına görsel yükleyin. Boş bırakılan slotlar placeholder olarak görünür.</p>
  ${slots}
  <button class="btn btn-p" onclick="saveBanners()">💾 Tüm Slotları Kaydet</button>`;
}

function handleBannerFile(e,i){
  const file=e.target.files[0];if(!file)return;
  readBannerFile(file,i);
}
function readBannerFile(file,i){
  if(!file.type.startsWith('image/')){toast('Sadece görsel yükleyin.','err');return;}
  if(file.size>3*1024*1024){toast('Görsel 3MB\'dan büyük olamaz.','err');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    document.getElementById('bb64_'+i).value=e.target.result;
    const prev=document.getElementById('bprev'+i);
    const img=document.getElementById('bprevimg'+i);
    const ph=document.getElementById('bph'+i);
    if(img)img.src=e.target.result;
    if(prev)prev.style.display='flex';
    if(ph)ph.style.display='none';
    toast('Görsel yüklendi ✓','ok');
  };
  reader.readAsDataURL(file);
}
function removeBannerImg(i){
  document.getElementById('bb64_'+i).value='';
  const prev=document.getElementById('bprev'+i);
  const ph=document.getElementById('bph'+i);
  if(prev)prev.style.display='none';
  if(ph)ph.style.display='flex';
  const fi=document.getElementById('bfile'+i);if(fi)fi.value='';
}
function saveBanners(){
  const banners=ld('banners',[{id:1,label:'',img:''},{id:2,label:'',img:''},{id:3,label:'',img:''},{id:4,label:'',img:''}]);
  banners.forEach((b,i)=>{
    const lbl=document.getElementById('blbl'+i);
    const b64=document.getElementById('bb64_'+i);
    if(lbl)b.label=lbl.value;
    if(b64&&b64.value)b.img=b64.value;
    else if(b64&&!b64.value)b.img='';
  });
  sv('banners',banners);
  toast('Slider görselleri kaydedildi!','ok');
}

/* ── SECURITY ── */
function rSecurity(){
  const creds=ld('adminCreds',{user:'admin',pass:'dekorcum2025'});
  return`
  <div class="sec-hd"><h2>Güvenlik</h2></div>
  <div class="panel">
    <div class="panel-hd"><h3>Şifre Değiştir</h3></div>
    <div class="panel-body">
      <div class="fr s"><div class="fld"><label>Mevcut Şifre</label><input id="sOld" type="password" placeholder="••••••••"></div></div>
      <div class="fr">
        <div class="fld"><label>Yeni Şifre</label><input id="sNew" type="password" placeholder="••••••••"></div>
        <div class="fld"><label>Yeni Şifre (Tekrar)</label><input id="sNew2" type="password" placeholder="••••••••"></div>
      </div>
      <button class="btn btn-p" onclick="changePass()">🔒 Şifreyi Değiştir</button>
    </div>
  </div>
  <div class="panel" style="margin-top:14px;">
    <div class="panel-hd"><h3>Kullanıcı Adı</h3></div>
    <div class="panel-body">
      <div class="fr s"><div class="fld"><label>Kullanıcı Adı</label><input id="sUsr" type="text" value="${esc(creds.user)}"></div></div>
      <button class="btn btn-out" onclick="changeUser()">Güncelle</button>
    </div>
  </div>`;
}
function changePass(){
  const creds=ld('adminCreds',{user:'admin',pass:'dekorcum2025'});
  const old=document.getElementById('sOld').value;
  const n1=document.getElementById('sNew').value;
  const n2=document.getElementById('sNew2').value;
  if(old!==creds.pass){toast('Mevcut şifre yanlış.','err');return;}
  if(n1.length<6){toast('Şifre en az 6 karakter olmalı.','err');return;}
  if(n1!==n2){toast('Şifreler eşleşmiyor.','err');return;}
  creds.pass=n1;sv('adminCreds',creds);toast('Şifre değiştirildi.','ok');
}
function changeUser(){
  const creds=ld('adminCreds',{user:'admin',pass:'dekorcum2025'});
  const u=document.getElementById('sUsr').value.trim();
  if(!u){toast('Boş bırakılamaz.','err');return;}
  creds.user=u;sv('adminCreds',creds);document.getElementById('tbUser').textContent=u;toast('Kullanıcı adı güncellendi.','ok');
}

/* ── TOAST ── */
function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`${type==='ok'?'✅':'❌'} ${msg}`;
  document.getElementById('toastC').appendChild(el);
  setTimeout(()=>{el.style.animation='tIn .3s ease reverse';setTimeout(()=>el.remove(),300);},3000);
}

/* ── UTILS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── SEED DEFAULT DATA ── */
if(!localStorage.getItem('dk_settings'))sv('settings',defS());
if(!localStorage.getItem('dk_categories'))sv('categories',defC());
if(!localStorage.getItem('dk_products'))sv('products',defP());
</script>
</body>
