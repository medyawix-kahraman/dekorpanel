<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dekopanel — Admin Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gd:#8B6914;--d:#0A0A0A;--d2:#111;--d3:#181818;--d4:#202020;--d5:#2A2A2A;--t:#E0D8CC;--m:#7A7060;--w:#F5F0E8;--green:#2ECC71;--red:#E74C3C;--blue:#3498DB;--sb:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--d);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;}
/* LOGIN */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a1208,#0A0A0A 70%);}
.lb{background:var(--d3);border:1px solid rgba(201,168,76,.18);padding:52px 44px;width:380px;border-radius:4px;text-align:center;}
.ll{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);margin-bottom:4px;}
.ls2{font-size:10px;letter-spacing:4px;color:var(--m);text-transform:uppercase;margin-bottom:32px;}
.fg{margin-bottom:13px;text-align:left;}
.fg label{display:block;font-size:11px;color:var(--m);margin-bottom:7px;text-transform:uppercase;font-weight:600;}
.fc{width:100%;background:var(--d4);border:1px solid rgba(201,168,76,.12);color:var(--t);padding:11px 13px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .3s;}
.fc:focus{border-color:var(--gold);}
.bl{width:100%;background:linear-gradient(135deg,var(--gold),var(--gd));color:#0A0A0A;border:none;padding:13px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border-radius:4px;margin-top:8px;}
.le{color:var(--red);font-size:12px;margin-top:9px;display:none;}
/* LAYOUT */
#app{display:none;}
.lay{display:flex;min-height:100vh;}
/* SIDEBAR */
.sb{width:var(--sb);background:var(--d2);border-right:1px solid rgba(201,168,76,.08);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
.sbt{padding:22px 18px;border-bottom:1px solid rgba(201,168,76,.07);}
.sbt .nm{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);}
.sbt .sub{font-size:9px;color:var(--m);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
.snav{padding:10px 0;flex:1;}
.ns{padding:7px 16px;font-size:10px;color:var(--m);letter-spacing:2px;text-transform:uppercase;margin-top:5px;}
.ni{display:flex;align-items:center;gap:9px;padding:10px 18px;color:var(--m);cursor:pointer;transition:all .3s;font-size:13px;font-weight:500;border-left:3px solid transparent;}
.ni:hover{background:rgba(201,168,76,.04);color:var(--t);}
.ni.on{background:rgba(201,168,76,.07);color:var(--gold);border-left-color:var(--gold);}
.sbo{padding:12px 18px;border-top:1px solid rgba(201,168,76,.07);}
.blo{width:100%;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.22);color:var(--red);padding:9px;font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;border-radius:4px;}
/* MAIN */
.mn{margin-left:var(--sb);flex:1;}
.tb{background:var(--d2);border-bottom:1px solid rgba(201,168,76,.07);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tbt{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--w);}
.tbu{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.16);color:var(--gold);padding:5px 12px;border-radius:20px;font-size:11.5px;}
.bd{padding:24px;}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:var(--d3);border:1px solid rgba(201,168,76,.07);border-radius:4px;padding:20px;position:relative;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gd));}
.scl{font-size:10px;color:var(--m);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.scv{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);}
.scc{font-size:11px;color:var(--green);margin-top:2px;}
/* PANEL */
.pnl{background:var(--d3);border:1px solid rgba(201,168,76,.07);border-radius:4px;margin-bottom:18px;}
.ph{padding:16px 20px;border-bottom:1px solid rgba(201,168,76,.05);display:flex;align-items:center;justify-content:space-between;}
.ph h3{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--w);}
.pb{padding:20px;}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 13px;background:var(--d4);color:var(--m);font-size:10px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;text-align:left;white-space:nowrap;}
.tbl td{padding:12px 13px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;vertical-align:middle;}
.tbl tr:hover td{background:rgba(201,168,76,.02);}
.tt{width:44px;height:44px;background:var(--d5);border-radius:3px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tt img{width:100%;height:100%;object-fit:cover;}
.bdg{padding:3px 8px;border-radius:2px;font-size:10px;font-weight:700;display:inline-block;}
.bg{background:rgba(46,204,113,.12);color:var(--green);}
.br{background:rgba(231,76,60,.12);color:var(--red);}
.bb{background:rgba(52,152,219,.12);color:var(--blue);}
/* BUTTONS */
.btn{padding:7px 14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;border-radius:3px;transition:all .3s;display:inline-flex;align-items:center;gap:5px;}
.bp{background:linear-gradient(135deg,var(--gold),var(--gd));color:#0A0A0A;}
.bp:hover{filter:brightness(1.1);}
.bo{background:transparent;border:1px solid rgba(201,168,76,.22);color:var(--gold);}
.bo:hover{background:rgba(201,168,76,.08);}
.bdd{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.22);color:var(--red);}
.bdd:hover{background:rgba(231,76,60,.16);}
.bsm{padding:5px 10px;font-size:11px;}
/* FORM */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
.fr3{grid-template-columns:1fr 1fr 1fr;}
.fr1{grid-template-columns:1fr;}
.fld{display:flex;flex-direction:column;gap:6px;}
.fld label{font-size:10px;color:var(--m);letter-spacing:.4px;text-transform:uppercase;font-weight:600;}
.fld input,.fld select,.fld textarea{background:var(--d4);border:1px solid rgba(201,168,76,.11);color:var(--t);padding:10px 12px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .3s;width:100%;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold);}
.fld select option{background:var(--d4);}
.fld textarea{resize:vertical;min-height:70px;}
/* TOGGLE */
.tgl{position:relative;width:42px;height:22px;cursor:pointer;display:inline-block;vertical-align:middle;}
.tgl input{display:none;}
.tsl{position:absolute;inset:0;background:var(--d5);border-radius:22px;transition:.3s;border:1px solid rgba(255,255,255,.07);}
.tsl::before{content:'';position:absolute;width:16px;height:16px;background:var(--m);border-radius:50%;left:2px;top:2px;transition:.3s;}
.tgl input:checked+.tsl{background:rgba(201,168,76,.18);border-color:var(--gold);}
.tgl input:checked+.tsl::before{transform:translateX(20px);background:var(--gold);}
/* IMAGE UPLOAD */
.imgup{border:2px dashed rgba(201,168,76,.2);border-radius:4px;background:var(--d4);min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;cursor:default;}
.imgup.drag{border-color:var(--gold);background:rgba(201,168,76,.04);}
.iph{display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;padding:16px;}
.iph svg{width:30px;height:30px;color:rgba(201,168,76,.2);}
.iph p{font-size:12px;color:var(--m);}
.iph small{font-size:10.5px;color:rgba(122,112,96,.5);}
.selfbtn{margin-top:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.22);color:var(--gold);padding:6px 16px;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;border-radius:3px;display:inline-block;}
.selfbtn:hover{background:rgba(201,168,76,.18);}
.iprev{display:none;flex-direction:column;align-items:center;gap:8px;padding:12px;width:100%;}
.iprev img{max-width:100%;object-fit:contain;border-radius:3px;display:block;}
.iprev .rmbtn{background:rgba(231,76,60,.8);border:none;color:#fff;padding:5px 12px;border-radius:3px;cursor:pointer;font-size:11.5px;font-weight:600;}
/* SIZE HINT */
.size-hint{font-size:10.5px;color:rgba(201,168,76,.5);margin-top:5px;}
/* COLOR CHIPS */
.cchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.cch{background:var(--d5);border:1px solid rgba(201,168,76,.11);color:var(--m);padding:3px 9px;border-radius:20px;font-size:11.5px;display:inline-flex;align-items:center;gap:4px;}
.cch .rm{color:var(--red);cursor:pointer;font-size:13px;line-height:1;}
.addcol{display:flex;gap:7px;margin-bottom:5px;}
.addcol input{flex:1;background:var(--d4);border:1px solid rgba(201,168,76,.11);color:var(--t);padding:8px 12px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;}
.addcol input:focus{border-color:var(--gold);}
/* INLINE FORM (no modal) */
.iform{background:var(--d3);border:1px solid rgba(201,168,76,.12);border-radius:4px;padding:24px;margin-bottom:18px;display:none;}
.iform.open{display:block;}
.iform-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.iform-hd h3{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--w);}
.iform-hd button{background:none;border:none;color:var(--m);font-size:20px;cursor:pointer;}
.iform-hd button:hover{color:var(--gold);}
.iform-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid rgba(201,168,76,.07);}
/* SH */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sh h2{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--w);}
/* TOAST */
.tc{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:var(--d3);border:1px solid rgba(201,168,76,.16);color:var(--t);padding:11px 16px;border-radius:4px;font-size:13px;display:flex;align-items:center;gap:8px;min-width:240px;animation:ti .3s ease;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.tok{border-color:rgba(46,204,113,.25);}
.terr{border-color:rgba(231,76,60,.25);}
@keyframes ti{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
/* MOBILE */
@media(max-width:900px){
  .sb{width:200px;transform:translateX(-100%);transition:transform .3s;}
  .sb.open{transform:translateX(0);}
  .mn{margin-left:0;}
  .sg{grid-template-columns:repeat(2,1fr);}
  .fr{grid-template-columns:1fr;}
  .fr3{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="ls">
  <div class="lb">
    <div class="ll">DEKOPANEL</div>
    <div class="ls2">Admin Paneli</div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="lay">
    <aside class="sb" id="sidebar">
      <div class="sbt"><div class="nm" id="sbnm">DEKOPANEL</div><div class="sub">Admin Paneli</div></div>
      <nav class="snav">
        <div class="ns">Genel</div>
        <div class="ni on" onclick="go('dash',this)">📊 Özet</div>
        <div class="ns">Ürün Yönetimi</div>
        <div class="ni" onclick="go('prods',this)">📦 Ürünler</div>
        <div class="ni" onclick="go('cats',this)">🗂️ Kategoriler</div>
        <div class="ns">İçerik</div>
        <div class="ni" onclick="go('camp',this)">🎯 Kampanya</div>
        <div class="ni" onclick="go('banners',this)">🎠 Slider Görselleri</div>
        <div class="ni" onclick="go('logo',this)">🖼️ Logo</div>
        <div class="ns">Firma</div>
        <div class="ni" onclick="go('settings',this)">⚙️ Firma Bilgileri</div>

</div>

<div class="tc" id="tc"></div>
<!-- hidden canvas for image resize -->
<canvas id="cvs" style="display:none"></canvas>

<script>
/* ── STORAGE ── */
function sv(k,v){try{localStorage.setItem('dk_'+k,JSON.stringify(v));return true;}catch(e){toast('Depolama hatası: '+e.message,'err');return false;}}
function ld(k,fb){try{var d=localStorage.getItem('dk_'+k);return d?JSON.parse(d):fb;}catch(e){return fb;}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── DEFAULTS ── */
function DS(){return ld('settings',{brandName:'DEKOPANEL',brandSub:'dekopanel.com.tr',phone:'0542 646 12 65',whatsapp:'905426461265',email:'info@dekopanel.com.tr',address:'Mimar Sinan Mh. Şht. Savcı Hakan Kılıç Cd. Mustafa Özsüllü Apt. No:56/A KONYA',instagram:'https://www.instagram.com/dekorcum_toptan',facebook:'https://www.facebook.com/Dekorcum-Yap%C4%B1-Dekorasyon-353565921947690',youtube:'',campaign:{active:true,title:'Bayi Kampanyası',desc:'Toptan alımlarda özel fiyatlar.',pct:'%15',label:'İndirim'},marqueeItems:['MDF Panel','Akustik Panel','Duvar Çıtası','Lambri','Bordür','Süpürgelik','Motifler','Toptan Satış']});}
function DC(){return ld('categories',[{id:1,name:'MDF Panel',slug:'mdf-panel',desc:'Dekoratif duvar panelleri'},{id:2,name:'Tavan & Duvar Lambri',slug:'lambri',desc:'Tavan ve duvar kaplamalar'},{id:3,name:'Duvar Çıtası',slug:'duvar-citasi',desc:'Her ölçüde duvar çıtaları'},{id:4,name:'Motifler',slug:'motifler',desc:'Dekoratif motifler'},{id:5,name:'Duvar Bordürleri',slug:'borduler',desc:'Klasik ve modern bordürler'},{id:6,name:'Süpürgelikler',slug:'supurgelik',desc:'PVC ve MDF süpürgelikler'},{id:7,name:'Akustik Panel',slug:'akustik',desc:'Ses ve ısı yalıtım panelleri'}]);}
function DP(){return ld('products',[{id:1,name:'DMP-ANADOLU CEVİZ MDF DUVAR PANELİ',code:'DMP-001',catId:1,price:300,oldPrice:350,unit:'boy',stock:100,badge:'İndirim',colors:['Ceviz','Beyaz'],desc:'1 boy için fiyatlandırılmıştır.',img:'',active:true},{id:2,name:'DP-OMEGA GÜMÜŞ EFEKTLİ SİYAH PANEL',code:'DP-002',catId:1,price:300,oldPrice:330,unit:'boy',stock:80,badge:'Yeni',colors:['Siyah','Gümüş'],desc:'Premium panel.',img:'',active:true},{id:3,name:'GOLD ALTIN DUVAR ÇITASI',code:'DC-001',catId:3,price:85,oldPrice:null,unit:'adet',stock:500,badge:'',colors:['Gold','Gümüş'],desc:'Dekoratif altın çıta.',img:'',active:true},{id:4,name:'AKUSTİK SES YALITIM PANELİ',code:'AK-001',catId:7,price:450,oldPrice:null,unit:'m²',stock:200,badge:'Yeni',colors:['Gri','Krem'],desc:'Ses ve ısı yalıtım.',img:'',active:true}]);}
function DBN(){return ld('banners',[{label:'',img:''},{label:'',img:''},{label:'',img:''},{label:'',img:''}]);}

/* ── IMAGE RESIZE (canvas) ── */
/* Ürün: 600x600 kare crop | Banner: 1200x500 landscape crop */
function resizeImg(file, w, h, quality, cb){
  if(!file.type.match(/^image\//)){toast('Sadece görsel dosyası yükleyin.','err');return;}
  if(file.size > 8*1024*1024){toast('Dosya 8MB\'dan büyük olamaz.','err');return;}
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var cvs = document.getElementById('cvs');
      cvs.width = w; cvs.height = h;
      var ctx = cvs.getContext('2d');
      /* cover crop */
      var srcW = img.width, srcH = img.height;
      var srcRatio = srcW/srcH, tgtRatio = w/h;
      var sx,sy,sw,sh;
      if(srcRatio > tgtRatio){
        sh = srcH; sw = srcH*tgtRatio;
        sx = (srcW-sw)/2; sy = 0;
      } else {
        sw = srcW; sh = srcW/tgtRatio;
        sx = 0; sy = (srcH-sh)/2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
      var data = cvs.toDataURL('image/jpeg', quality||0.85);
      cb(data);
    };
    img.onerror = function(){toast('Görsel yüklenemedi.','err');};
    img.src = e.target.result;
  };
  reader.onerror = function(){toast('Dosya okunamadı.','err');};
  reader.readAsDataURL(file);
}

/* show preview in upload box */
function showPrev(upId, src){
  var up = document.getElementById(upId);
  if(!up) return;
  var ph = up.querySelector('.iph');
  var prev = up.querySelector('.iprev');
  var img = up.querySelector('.iprev img');
  if(ph) ph.style.display = 'none';
  if(img) img.src = src;
  if(prev) prev.style.display = 'flex';
}
function clearPrev(upId, hiddenId, fileId){
  var up = document.getElementById(upId);
  if(!up) return;
  var ph = up.querySelector('.iph');
  var prev = up.querySelector('.iprev');
  var img = up.querySelector('.iprev img');
  if(ph) ph.style.display = 'flex';
  if(img) img.src = '';
  if(prev) prev.style.display = 'none';
  if(hiddenId) document.getElementById(hiddenId).value = '';
  if(fileId){ var fi=document.getElementById(fileId); if(fi) fi.value=''; }
}

/* drag over/leave/drop */
function dov(e){ e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drag'); }
function dlv(e){ e.stopPropagation(); e.currentTarget.classList.remove('drag'); }

/* ── AUTH ── */
function login(){
  var cr=ld('adminCreds',{user:'admin',pass:'dekopanel2025'});
  if(document.getElementById('lu').value.trim()===cr.user && document.getElementById('lp').value===cr.pass){
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('tbu').textContent=cr.user;
    document.getElementById('sbnm').textContent=DS().brandName;
    go('dash',null);
  } else { document.getElementById('le').style.display='block'; }
}
function logout(){ document.getElementById('ls').style.display='flex'; document.getElementById('app').style.display='none'; document.getElementById('lp').value=''; }

/* ── NAV ── */
var TTLS={dash:'📊 Özet',prods:'📦 Ürünler',cats:'🗂️ Kategoriler',camp:'🎯 Kampanya',banners:'🎠 Slider Görselleri',logo:'🖼️ Logo',settings:'⚙️ Firma Bilgileri',social:'📱 Sosyal Medya',sec:'🔒 Güvenlik'};
function go(name,el){
  if(el){ document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on');}); el.classList.add('on'); }
  document.getElementById('tbt').textContent = TTLS[name]||name;
  var b = document.getElementById('bd');
  b.innerHTML = '';
  if(name==='dash') b.innerHTML = rDash();
  else if(name==='prods') rProds();
  else if(name==='cats') rCats();
  else if(name==='camp') b.innerHTML = rCamp();
  else if(name==='banners') rBanners();
  else if(name==='logo') b.innerHTML = rLogo();
  else if(name==='settings') b.innerHTML = rSettings();
  else if(name==='social') b.innerHTML = rSocial();
  else if(name==='sec') b.innerHTML = rSec();
}

/* ── DASHBOARD ── */
function rDash(){
  var ps=DP(),cs=DC();
  return '<div class="sg">'+

/* Ürün görsel handlers */
function pickedProd(e){ var f=e.target.files[0]; if(f) processProd(f); }
function dropProd(e){
  e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('drag');
  var f=e.dataTransfer.files[0]; if(f) processProd(f);
}
function processProd(file){
  resizeImg(file, 600, 600, 0.88, function(data){

    showPrev('pimgup', data);

function clearProd(){

}

/* Save product */
function saveProd(){
  var name=(document.getElementById('pn').value||'').trim();
  var code=(document.getElementById('pc').value||'').trim();
  var price=parseFloat(document.getElementById('pp').value);
  if(!name||!code||!price){ toast('Ad, kod ve fiyat zorunludur.','err'); return; }
  var oldPrice=parseFloat(document.getElementById('pop').value)||null;
  var catId=parseInt(document.getElementById('pcat').value);
  var unit=document.getElementById('pu').value;
  var badge=document.getElementById('pb').value;
  var active=document.getElementById('pa').checked;
  var desc=(document.getElementById('pdesc').value||'').trim();
  var img=document.getElementById('pimgb64').value||'';
  var stock=parseInt(document.getElementById('pst').value)||0;
  var ps=DP();
  if(epid){
    var i=ps.findIndex(function(p){return p.id===epid;});
    if(i>-1) ps[i]=Object.assign({},ps[i],{name:name,code:code,price:price,oldPrice:oldPrice,catId:catId,unit:unit,badge:badge,active:active,desc:desc,img:img,stock:stock,colors:ccols.slice()});
  } else {
    var nid=Math.max.apply(null,[0].concat(ps.map(function(p){return p.id;})))+1;
    ps.push({id:nid,name:name,code:code,price:price,oldPrice:oldPrice,catId:catId,unit:unit,badge:badge,active:active,desc:desc,img:img,stock:stock,colors:ccols.slice()});
  }
  if(sv('products',ps)){ closePForm(); go('prods',null); toast(epid?'Ürün güncellendi ✓':'Ürün eklendi ✓','ok'); }
}

function delP(id){
  if(!confirm('Bu ürünü silmek istediğinize emin misiniz?')) return;
  sv('products', DP().filter(function(p){return p.id!==id;}));
  go('prods',null); toast('Ürün silindi.','ok');
}

function pickedBanner(e,i){ var f=e.target.files[0]; if(f) processBanner(f,i); }
function dropBanner(e,i){
  e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('drag');
  var f=e.dataTransfer.files[0]; if(f) processBanner(f,i);
}
function processBanner(file,i){
  resizeImg(file, 1200, 500, 0.88, function(data){
    if(!window._bannerData) window._bannerData=[{label:'',img:''},{label:'',img:''},{label:'',img:''},{label:'',img:''}];
    window._bannerData[i].img = data;
    document.getElementById('bb64_'+i).value = 'LOADED';
    var img=document.getElementById('bpimg'+i); if(img) img.src=data;
    var ph=document.getElementById('bph'+i); if(ph) ph.style.display='none';
    var prev=document.getElementById('bprev'+i); if(prev) prev.style.display='flex';
    toast('Slayt '+(i+1)+' görseli yüklendi (1200×500) ✓','ok');
  });
}
function rmBanner(i){
  if(window._bannerData) window._bannerData[i].img='';
  document.getElementById('bb64_'+i).value='';
  var img=document.getElementById('bpimg'+i); if(img) img.src='';
  var prev=document.getElementById('bprev'+i); if(prev) prev.style.display='none';
  var ph=document.getElementById('bph'+i); if(ph) ph.style.display='flex';
  var fi=document.getElementById('bfi'+i); if(fi) fi.value='';
  toast('Slayt '+(i+1)+' görseli kaldırıldı.','ok');
}
function saveBanners(){
  var banners=DBN();
  for(var i=0;i<4;i++){
    var lbl=document.getElementById('blbl'+i);
    if(lbl) banners[i].label=lbl.value;
    if(window._bannerData && window._bannerData[i]){
      if(window._bannerData[i].img) banners[i].img=window._bannerData[i].img;
      else if(document.getElementById('bb64_'+i).value==='') banners[i].img='';
    }
  }
  if(sv('banners',banners)) toast('Slider görselleri kaydedildi! Siteyi yenileyince görünecek.','ok');
}

/* ── LOGO ── */
function rLogo(){
  var logo=ld('logoImg','');
  return '<div class="sh"><h2>Logo Yükle</h2></div>'+
  '<div class="pnl"><div class="pb">'+
  '<p style="color:var(--m);font-size:13px;margin-bottom:14px;">PNG şeffaf arka plan önerilir. Maks 2MB. Kaydettikten sonra siteyi yenileyiniz.</p>'+
  '<div style="background:var(--d4);border:1px solid rgba(201,168,76,.1);padding:18px;text-align:center;min-height:88px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;" id="lgprev">'+
  (logo?'<img src="'+logo+'" style="max-height:72px;max-width:200px;object-fit:contain;">':'<span style="color:var(--m);font-size:13px;">Henüz logo yüklenmedi</span>')+
  '</div>'+
  '<div class="imgup" id="lgup" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="dropLogo(event)" style="min-height:120px;">'+
  '<div class="iph">'+
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'+
  '<p>Logoyu buraya sürükleyin</p><small>PNG şeffaf arka plan — Max 2MB</small>'+
  '<span class="selfbtn" onclick="document.getElementById(\'lgfi\').click()">📂 Dosya Seç</span>'+
  '</div></div>'+
  '<input type="file" id="lgfi" accept="image/*" style="display:none" onchange="pickedLogo(event)">'+
  (logo?'<button class="btn bdd" type="button" style="margin-top:12px;" onclick="rmLogo()">🗑️ Logoyu Kaldır</button>':'')+
  '</div></div>';
}
function pickedLogo(e){ var f=e.target.files[0]; if(f) processLogo(f); }
function dropLogo(e){ e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('drag'); var f=e.dataTransfer.files[0]; if(f) processLogo(f); }
function processLogo(file){
  if(!file.type.match(/^image\//)){toast('Sadece görsel yükleyin.','err');return;}
  if(file.size>2097152){toast('Logo 2MB\'dan büyük olamaz.','err');return;}
  var reader=new FileReader();
  reader.onload=function(e){ if(sv('logoImg',e.target.result)){go('logo',null);toast('Logo kaydedildi! Siteyi yenileyince görünecek.','ok');} };
  reader.onerror=function(){toast('Dosya okunamadı.','err');};
  reader.readAsDataURL(file);
}
function rmLogo(){ if(!confirm('Logoyu kaldır?'))return; sv('logoImg',''); go('logo',null); toast('Logo kaldırıldı.','ok'); }

function chgPass(){
  var cr=ld('adminCreds',{user:'admin',pass:'dekopanel2025'});
  var o=document.getElementById('sold').value; var n1=document.getElementById('snew').value; var n2=document.getElementById('snew2').value;

function chgUser(){
  var cr=ld('adminCreds',{user:'admin',pass:'dekopanel2025'}); var u=(document.getElementById('susr').value||'').trim();
  if(!u){toast('Boş bırakılamaz.','err');return;} cr.user=u; sv('adminCreds',cr); document.getElementById('tbu').textContent=u; toast('Güncellendi.','ok');
}

/* ── TOAST ── */
function toast(msg,type){
  var el=document.createElement('div'); el.className='toast '+(type==='ok'?'tok':'terr');
  el.innerHTML=(type==='ok'?'✅':'❌')+' '+msg;
  document.getElementById('tc').appendChild(el);
  setTimeout(function(){el.style.animation='ti .3s ease reverse'; setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},300);},3200);
}
